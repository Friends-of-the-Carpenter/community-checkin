function api(path, opts={}) {
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: HEADERS, ...opts });
}

function isServiceAvailableToday(s) {
  const days = CAPPED_SERVICES_DAYS[s];
  if (!days) return true;
  return days.includes(new Date().getDay());
}

function todayISO() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d.toISOString();
}

function initials(name) {
  return name.trim().split(" ").filter(Boolean).map(w => w[0].toUpperCase()).slice(0, 2).join("");
}

function fmt(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", {month:"short",day:"numeric",year:"numeric"}) + " " + d.toLocaleTimeString("en-US", {hour:"numeric",minute:"2-digit"});
}

function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", {month:"short",day:"numeric"});
}

function fmtMonth(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", {month:"short",year:"numeric"});
}

function duration(inT, outT, service) {
  if (!outT || NO_DURATION_SERVICES.includes(service)) return null;
  const m = Math.round((new Date(outT) - new Date(inT)) / 60000);
  return m < 60 ? `${m}m` : `${Math.floor(m/60)}h ${m%60}m`;
}

const AV_COLORS = [{bg:"#C2E8E6",color:"#1D5C5A"},{bg:"#B8DFE8",color:"#1A4A5C"},{bg:"#C8E6D4",color:"#1A5C35"},{bg:"#E6D4C8",color:"#5C3A1A"},{bg:"#D4C8E6",color:"#3A1A5C"}];

function avColor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return AV_COLORS[h % AV_COLORS.length];
}

const emptyForm = {name:"",guestNumber:"",memberId:"",type:"Guest",service:"",notes:""};

function Logo() {
  return <img src="https://cdn.shopify.com/s/files/1/0582/8719/4214/files/FOC_Logo_white.png?v=1773347276" alt="Friends of the Carpenter" style={{height:105,width:"auto"}}/>;
}

function SimpleBarChart({data, keys, colors, height=180}) {
  if (!data || data.length === 0) return <p style={{textAlign:"center",color:"#5A7070",fontSize:13,padding:"1rem 0"}}>No data for this period.</p>;
  const maxVal = Math.max(1, ...data.flatMap(d => keys.map(k => d[k] || 0)));
  const barW = Math.max(8, Math.floor(280 / data.length) - 4);
  return (
    <div style={{overflowX:"auto"}}>
      <div style={{display:"flex",alignItems:"flex-end",gap:4,height,minWidth:data.length*((barW*keys.length)+8),paddingBottom:24,position:"relative"}}>
        {data.map((d, i) => (
          <div key={i} style={{display:"flex",alignItems:"flex-end",gap:2,flexShrink:0}}>
            {keys.map(k => {
              const pct = (d[k] || 0) / maxVal * 100;
              return (
                <div key={k} style={{width:barW,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  {d[k] > 0 && <span style={{fontSize:9,color:"#5A7070"}}>{d[k]}</span>}
                  <div style={{width:"100%",height:`${pct*(height-32)/100}px`,background:colors[k],borderRadius:"3px 3px 0 0",minHeight:d[k]>0?4:0,transition:"height 0.3s"}}/>
                </div>
              );
            })}
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:4,overflowX:"auto",paddingTop:4}}>
        {data.map((d, i) => (
          <span key={i} style={{fontSize:10,color:"#8AA5A5",flexShrink:0,width:(barW*keys.length)+(keys.length-1)*2,textAlign:"center",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{d.date}</span>
        ))}
      </div>
    </div>
  );
}

function SimpleLineChart({data, height=180}) {
  if (!data || data.length === 0) return <p style={{textAlign:"center",color:"#5A7070",fontSize:13,padding:"1rem 0"}}>No completed volunteer check-outs for this period.</p>;
  const maxVal = Math.max(1, ...data.map(d => d.hours));
  const w = 500, h = height - 30, pad = 8;
  const pts = data.map((d, i) => {
    const x = pad + (i / Math.max(data.length - 1, 1)) * (w - pad * 2);
    const y = h - (d.hours / maxVal) * (h - pad * 2) - pad;
    return {x, y, d};
  });
  const pathD = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p.x},${p.y}`).join(" ");
  const fmtHours = (hrs) => {
    const h = Math.floor(hrs);
    const m = Math.round((hrs % 1) * 60);
    return m > 0 ? `${h}h ${m}m` : `${h}h`;
  };
  return (
    <div style={{overflowX:"auto"}}>
      <svg viewBox={`0 0 ${w} ${height}`} style={{width:"100%",height}}>
        {[0,0.25,0.5,0.75,1].map(t => (
          <line key={t} x1={pad} x2={w-pad} y1={h-(t*(h-pad*2))-pad} y2={h-(t*(h-pad*2))-pad} stroke="#D0E6E5" strokeDasharray="3 3"/>
        ))}
        <path d={pathD} fill="none" stroke={CHART_COLORS["Volunteer"]} strokeWidth={2.5} strokeLinejoin="round"/>
        {pts.map((p, i) => (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r={4} fill={CHART_COLORS["Volunteer"]}/>
            <text x={p.x} y={p.y-8} textAnchor="middle" fontSize={9} fill="#5A7070">{fmtHours(p.d.hours)}</text>
            <text x={p.x} y={height-4} textAnchor="middle" fontSize={9} fill="#8AA5A5">{p.d.date}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function PeopleRemover({people, onRemove, onFlag}) {
  const [query, setQuery] = React.useState("");
  const [confirm, setConfirm] = React.useState(null);
  const [flagReason, setFlagReason] = React.useState("");
  const [flagging, setFlagging] = React.useState(null);
  const matches = query.trim().length > 0
    ? people.filter(p => p.name.toLowerCase().includes(query.toLowerCase()) || String(p.guest_number).includes(query)).slice(0, 5)
    : [];
  return (
    <div>
      <input placeholder="Search by name or guest #…" value={query} onChange={e=>{setQuery(e.target.value);setConfirm(null);setFlagging(null);}} style={{...inpStyle,marginBottom:8}}/>
      {matches.map(p => (
        <div key={p.id} style={{background:p.flagged?"#FFF5F5":C.white,border:`1px solid ${p.flagged?C.dangerBorder:C.border}`,borderRadius:8,marginBottom:8,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:13,fontWeight:600,color:C.text}}>{p.name}</span>
              <span style={{fontSize:12,color:C.textMuted}}>#{p.guest_number}</span>
              {p.flagged && <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:C.dangerBg,color:C.danger,fontWeight:600}}>⚑ Flagged</span>}
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setFlagging(flagging===p.id?null:p.id);setConfirm(null);setFlagReason(p.flag_reason||"");}} style={{...btnGhost,fontSize:12,color:p.flagged?C.teal:C.danger,borderColor:p.flagged?C.border:C.dangerBorder}}>{p.flagged?"Unflag":"Flag"}</button>
              {confirm===p.id ? (
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>{onRemove(p);setQuery("");setConfirm(null);}} style={{...btnGhost,color:C.danger,borderColor:C.dangerBorder,fontSize:12}}>Confirm</button>
                  <button onClick={()=>setConfirm(null)} style={btnGhost}>Cancel</button>
                </div>
              ) : (
                <button onClick={()=>{setConfirm(p.id);setFlagging(null);}} style={{...btnGhost,color:C.danger,borderColor:C.dangerBorder}}>Remove</button>
              )}
            </div>
          </div>
          {flagging===p.id && (
            <div style={{padding:"10px 12px",borderTop:`1px solid ${C.border}`,background:C.bg}}>
              {p.flagged ? (
                <div>
                  <p style={{margin:"0 0 8px",fontSize:12,color:C.textMuted}}>Current reason: <em>{p.flag_reason||"No reason given"}</em></p>
                  <button onClick={()=>{onFlag(p,false,"");setFlagging(null);}} style={{...btnOutline,fontSize:12,padding:"6px 14px"}}>Confirm unflag</button>
                </div>
              ) : (
                <div>
                  <input placeholder="Reason for flagging (optional)…" value={flagReason} onChange={e=>setFlagReason(e.target.value)} style={{...inpStyle,marginBottom:8,fontSize:13}}/>
                  <button onClick={()=>{onFlag(p,true,flagReason);setFlagging(null);setFlagReason("");}} style={{...btnPrimary,fontSize:13,padding:"7px 16px",background:C.danger}}>Confirm flag</button>
                </div>
              )}
            </div>
          )}
          {p.flagged && p.flag_reason && flagging!==p.id && <div style={{padding:"4px 12px 8px",fontSize:11,color:C.danger}}>Reason: {p.flag_reason}</div>}
        </div>
      ))}
      {query.trim().length > 0 && matches.length === 0 && <p style={{fontSize:12,color:C.textMuted}}>No matches found.</p>}
    </div>
  );
}

function AnalyticsTab({records}) {
  const [range, setRange] = React.useState("7days");

  function getFiltered() {
    const now = new Date();
    let cutoff;
    if (range==="7days") { cutoff=new Date(now); cutoff.setDate(cutoff.getDate()-6); }
    else if (range==="30days") { cutoff=new Date(now); cutoff.setDate(cutoff.getDate()-29); }
    else if (range==="month") { cutoff=new Date(now.getFullYear(),now.getMonth(),1); }
    else if (range==="quarter") { const q=Math.floor(now.getMonth()/3); cutoff=new Date(now.getFullYear(),q*3,1); }
    else if (range==="year") { cutoff=new Date(now.getFullYear(),0,1); }
    else { cutoff=new Date(0); }
    cutoff.setHours(0,0,0,0);
    return records.filter(r => new Date(r.check_in) >= cutoff);
  }

  function meetsMinDuration(r) {
    if (NO_DURATION_SERVICES.includes(r.service)) return true;
    if (!r.check_out) return false;
    const mins = (new Date(r.check_out) - new Date(r.check_in)) / 60000;
    return mins >= MIN_DURATION_MINUTES;
  }

  function getKey(r) {
    return range === "year" ? fmtMonth(r.check_in) : fmtDate(r.check_in);
  }

  function groupBy(recs) {
    const map = {};
    recs.forEach(r => {
      const k = getKey(r);
      if (!map[k]) map[k] = {date:k};
      CHART_SERVICES.forEach(s => { if (!map[k][s]) map[k][s] = 0; });
      map[k][r.service] = (map[k][r.service] || 0) + 1;
    });
    return Object.values(map).sort((a,b) => new Date(a.date) > new Date(b.date) ? 1 : -1);
  }

  function getVolHours(recs) {
    const map = {};
    recs.filter(r => r.service==="Volunteer" && r.check_out).forEach(r => {
      const k = getKey(r);
      if (!map[k]) map[k] = {date:k, hours:0};
      map[k].hours += (new Date(r.check_out) - new Date(r.check_in)) / 3600000;
    });
    return Object.values(map).sort((a,b) => new Date(a.date) > new Date(b.date) ? 1 : -1);
  }

  const filtered = getFiltered().filter(meetsMinDuration);
  const chartData = groupBy(filtered);
  const volHours = getVolHours(filtered);
  const totals = {};
  CHART_SERVICES.forEach(s => { totals[s] = filtered.filter(r => r.service===s).length; });

  const ranges = [{id:"7days",label:"7 days"},{id:"30days",label:"30 days"},{id:"month",label:"This month"},{id:"quarter",label:"This quarter"},{id:"year",label:"This year"},{id:"all",label:"All time"}];
  const showersLaundryColors = {"Showers":CHART_COLORS["Showers"],"Laundry":CHART_COLORS["Laundry"]};
  const dayCenterColors = {"Day Center":CHART_COLORS["Day Center"],"Community Partnership":CHART_COLORS["Community Partnership"]};

  return (
    <div>
      <div style={{display:"flex",gap:6,marginBottom:20,flexWrap:"wrap"}}>
        {ranges.map(r => (
          <button key={r.id} onClick={()=>setRange(r.id)} style={{...btnGhost,fontSize:12,background:range===r.id?"#46b4bf":"transparent",color:range===r.id?"#fff":"#5A7070",borderColor:range===r.id?"#46b4bf":"#D0E6E5",padding:"6px 12px"}}>{r.label}</button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:10,marginBottom:14}}>
        {["Showers","Laundry","Day Center"].map(s => (
          <div key={s} style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:10,padding:"12px 10px",textAlign:"center"}}>
            <p style={{margin:0,fontSize:22,fontWeight:700,color:CHART_COLORS[s]}}>{totals[s]||0}</p>
            <p style={{margin:0,fontSize:11,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>{s}</p>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:10,marginBottom:24}}>
        {["Community Partnership","Volunteer"].map(s => (
          <div key={s} style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:10,padding:"12px 10px",textAlign:"center"}}>
            <p style={{margin:0,fontSize:22,fontWeight:700,color:CHART_COLORS[s]}}>{totals[s]||0}</p>
            <p style={{margin:0,fontSize:11,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>{s}</p>
          </div>
        ))}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}}>
        {CHART_SERVICES.map(s => (
          <div key={s} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:CHART_COLORS[s]}}/>
            <span style={{fontSize:12,color:"#5A7070"}}>{s}</span>
          </div>
        ))}
      </div>
      {chartData.length===0 ? <p style={{textAlign:"center",color:"#5A7070",padding:"2rem 0",fontSize:14}}>No data for this period.</p> : (
        <>
          <div style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:12,padding:16,marginBottom:16}}>
            <p style={{margin:"0 0 14px",fontSize:13,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Showers & Laundry</p>
            <SimpleBarChart data={chartData} keys={["Showers","Laundry"]} colors={showersLaundryColors}/>
          </div>
          <div style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:12,padding:16,marginBottom:16}}>
            <p style={{margin:"0 0 14px",fontSize:13,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Day Center & Community Partnership</p>
            <SimpleBarChart data={chartData} keys={["Day Center","Community Partnership"]} colors={dayCenterColors}/>
          </div>
          <div style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:12,padding:16,marginBottom:16}}>
            <p style={{margin:"0 0 14px",fontSize:13,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Volunteer hours</p>
            <SimpleLineChart data={volHours}/>
          </div>
        </>
      )}
    </div>
  );
}

function QueueView({records, people, onCheckOut, onLogout, loadData}) {
  const services = Object.keys(CAPPED_SERVICES);
  return (
    <div style={{minHeight:"100vh",background:"#F7FAFA"}}>
      <div style={{background:"#46b4bf",padding:"24px 20px 18px",textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:14}}><Logo/></div>
        <div style={{display:"flex",justifyContent:"center",gap:8}}>
          <button onClick={loadData} style={{...btnGhost,background:"rgba(255,255,255,0.15)",color:"#fff",borderColor:"rgba(255,255,255,0.3)"}}>Refresh ↻</button>
          <button onClick={onLogout} style={{...btnGhost,background:"rgba(255,255,255,0.15)",color:"#fff",borderColor:"rgba(255,255,255,0.3)"}}>Log out</button>
        </div>
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:"24px 16px"}}>
        <h2 style={{margin:"0 0 4px",fontSize:20,fontWeight:700}}>Showers & Laundry</h2>
        <p style={{margin:"0 0 24px",fontSize:13,color:"#5A7070"}}>Showers & Laundry — today</p>
        {services.map(svc => {
          const cap = CAPPED_SERVICES[svc];
          const queue = records.filter(r => r.service===svc && r.check_in>=todayISO()).sort((a,b) => (a.queue_position||0)-(b.queue_position||0));
          const active = queue.filter(r => !r.check_out);
          const done = queue.filter(r => r.check_out);
          const used = queue.length;
          const pct = Math.round(used / cap * 100);
          return (
            <div key={svc} style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:12,padding:20,marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <h3 style={{margin:0,fontSize:17,fontWeight:700}}>{svc}</h3>
                <span style={{fontSize:13,fontWeight:600,color:used>=cap?"#C0392B":"#46b4bf",background:used>=cap?"#FCECEA":"#EAF7F8",padding:"3px 10px",borderRadius:20}}>{used>=cap?"Full":`${cap-used} spots left`}</span>
              </div>
              <div style={{height:8,borderRadius:4,background:"#EAF7F8",marginBottom:14}}>
                <div style={{height:8,borderRadius:4,width:`${pct}%`,background:used>=cap?"#C0392B":used/cap>0.8?"#E6A817":"#46b4bf",transition:"width 0.3s"}}/>
              </div>
              <div style={{display:"flex",gap:20,marginBottom:16,paddingBottom:14,borderBottom:"1px solid #D0E6E5"}}>
                {[["Total",used],["Active",active.length],["Done",done.length]].map(([l,v]) => (
                  <div key={l} style={{textAlign:"center"}}>
                    <p style={{margin:0,fontSize:22,fontWeight:700,color:"#46b4bf"}}>{v}</p>
                    <p style={{margin:0,fontSize:11,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>{l}</p>
                  </div>
                ))}
              </div>
              {active.length===0 && <p style={{fontSize:13,color:"#5A7070",textAlign:"center",padding:"12px 0"}}>No active visitors in queue.</p>}
              {active.map(r => {
                const person = people.find(p => p.name===r.name);
                const av = avColor(r.name);
                return (
                  <div key={r.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:"#EAF7F8",borderRadius:8,marginBottom:8,border:"1px solid #C0E8EC"}}>
                    <div style={{width:36,height:36,borderRadius:"50%",background:av.bg,color:av.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}}>{initials(r.name)||"?"}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontWeight:600,fontSize:14}}>{r.name}</span>
                        {person && <span style={{fontSize:11,color:"#5A7070"}}>#{person.guest_number}</span>}
                      </div>
                      <p style={{margin:0,fontSize:11,color:"#5A7070"}}>Queue #{r.queue_position} · In: {fmt(r.check_in)}</p>
                    </div>
                    <button onClick={()=>onCheckOut(r.id)} style={{...btnOutline,fontSize:12,padding:"5px 12px",flexShrink:0}}>Check out</button>
                  </div>
                );
              })}
              {done.length > 0 && (
                <details style={{marginTop:8}}>
                  <summary style={{fontSize:12,color:"#5A7070",cursor:"pointer",userSelect:"none"}}>Show completed ({done.length})</summary>
                  <div style={{marginTop:8}}>
                    {done.map(r => {
                      const person = people.find(p => p.name===r.name);
                      const av = avColor(r.name);
                      return (
                        <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,marginBottom:6,opacity:0.65}}>
                          <div style={{width:30,height:30,borderRadius:"50%",background:av.bg,color:av.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0}}>{initials(r.name)||"?"}</div>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <span style={{fontSize:13}}>{r.name}</span>
                              {person && <span style={{fontSize:11,color:"#5A7070"}}>#{person.guest_number}</span>}
                            </div>
                            <p style={{margin:0,fontSize:11,color:"#5A7070"}}>Queue #{r.queue_position}</p>
                          </div>
                          <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#EAF7F8",color:"#46b4bf",fontWeight:500}}>Done</span>
                        </div>
                      );
                    })}
                  </div>
                </details>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState("checkin");
  const [form, setForm] = useState(emptyForm);
  const [records, setRecords] = useState([]);
  const [services, setServices] = useState([]);
  const [people, setPeople] = useState([]);
  const [suggestions, setSuggestions] = useState([]);
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [success, setSuccess] = useState(null);
  const [flagAlert, setFlagAlert] = useState(null);
  const [search, setSearch] = useState("");
  const [filterType, setFilterType] = useState("All");
  const [filterService, setFilterService] = useState("All");
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [adminAuth, setAdminAuth] = useState(false);
  const [queueAuth, setQueueAuth] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState(false);
  const [showPinModal, setShowPinModal] = useState(null);
  const [newService, setNewService] = useState("");
  const [dbError, setDbError] = useState(null);
  const suggestRef = useRef(null);

  const loadData = useCallback(async () => {
    try {
      const [rRes, sRes, pRes] = await Promise.all([
        api("checkin_records?order=check_in.desc"),
        api("checkin_services?order=name.asc"),
        api("people?order=name.asc")
      ]);
      if (!rRes.ok || !sRes.ok || !pRes.ok) throw new Error();
      const [rData, sData, pData] = await Promise.all([rRes.json(), sRes.json(), pRes.json()]);
      setRecords(rData); setServices(sData.map(s => s.name)); setPeople(pData); setDbError(null);
    } catch(_) { setDbError("Could not connect to database."); }
    setLoading(false);
  }, []);

  useEffect(() => { loadData(); const t = setInterval(loadData, 15000); return () => clearInterval(t); }, [loadData]);
  useEffect(() => {
    function h(e) { if (suggestRef.current && !suggestRef.current.contains(e.target)) setShowSuggestions(false); }
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  function handleNameInput(val) {
    setForm(f => ({...f, name:val, guestNumber:""})); setErrors(e => ({...e, name:undefined})); setFlagAlert(null);
    if (!val.trim()) { setSuggestions([]); setShowSuggestions(false); return; }
    const q = val.toLowerCase();
    const m = people.filter(p => p.name.toLowerCase().includes(q) || String(p.guest_number).includes(q)).slice(0, 6);
    setSuggestions(m); setShowSuggestions(m.length > 0);
  }

  function handleGuestNumberInput(val) {
    setForm(f => ({...f, guestNumber:val, name:""})); setErrors(e => ({...e, name:undefined})); setFlagAlert(null);
    if (!val.trim()) { setSuggestions([]); setShowSuggestions(false); return; }
    const m = people.filter(p => String(p.guest_number).includes(val.trim())).slice(0, 6);
    setSuggestions(m); setShowSuggestions(m.length > 0);
  }

  function selectPerson(p) {
    setForm(f => ({...f, name:p.name, guestNumber:String(p.guest_number)}));
    setSuggestions([]); setShowSuggestions(false); setErrors(e => ({...e, name:undefined}));
    if (p.flagged) setFlagAlert(p); else setFlagAlert(null);
  }

  function countToday(s) { return records.filter(r => r.service===s && r.check_in>=todayISO()).length; }

  function validate() {
    const e = {};
    if (!form.name.trim() && !form.guestNumber.trim()) e.name = "Name or guest number is required";
    if (!form.service) e.service = "Please select a service";
    if (form.service && CAPPED_SERVICES[form.service] && countToday(form.service) >= CAPPED_SERVICES[form.service]) e.service = `${form.service} is full for today.`;
    return e;
  }

  async function submit() {
    const e = validate(); if (Object.keys(e).length) { setErrors(e); return; }
    let name = form.name.trim(), gNum = form.guestNumber.trim();
    if (!name && gNum) { const match = people.find(p => String(p.guest_number)===gNum); if (!match) { setErrors({name:"Guest number not found."}); return; } name = match.name; }
    const person = people.find(p => p.name.toLowerCase()===name.toLowerCase());
    if (person?.flagged) { setFlagAlert(person); return; }
    setSaving(true);
    let guestNumber = gNum;
    const existing = person;
    if (!existing) {
      try {
        const res = await api("people", {method:"POST", body:JSON.stringify({name}), headers:{...HEADERS,"Prefer":"return=representation"}});
        if (!res.ok) throw new Error();
        const [np] = await res.json(); guestNumber = String(np.guest_number); await loadData();
      } catch(_) { setErrors({submit:"Failed to register guest."}); setSaving(false); return; }
    } else { guestNumber = String(existing.guest_number); }
    const position = form.service && CAPPED_SERVICES[form.service] ? countToday(form.service) + 1 : null;
    try {
      const res = await api("checkin_records", {method:"POST", body:JSON.stringify({name, member_id:form.memberId||null, type:form.type, service:form.service, notes:form.notes||null, queue_position:position, check_in:new Date().toISOString(), check_out:null}), headers:{...HEADERS,"Prefer":"return=representation"}});
      if (!res.ok) throw new Error();
      await loadData();
      setSuccess({name, guestNumber, service:form.service, position, isNew:!existing});
      setForm(emptyForm); setErrors({}); setFlagAlert(null);
      setTimeout(() => setSuccess(null), 6000);
    } catch(_) { setErrors({submit:"Failed to save. Please try again."}); }
    setSaving(false);
  }

  async function checkOut(id) { await api(`checkin_records?id=eq.${id}`, {method:"PATCH", body:JSON.stringify({check_out:new Date().toISOString()}), headers:{...HEADERS,"Prefer":"return=minimal"}}); loadData(); }
  async function deleteRecord(id) { await api(`checkin_records?id=eq.${id}`, {method:"DELETE"}); loadData(); }
  async function flagPerson(p, flagged, reason) { await api(`people?id=eq.${p.id}`, {method:"PATCH", body:JSON.stringify({flagged, flag_reason:reason||null}), headers:{...HEADERS,"Prefer":"return=minimal"}}); loadData(); }

  function exportCSV() {
    const hdr = ["Name","Guest #","Type","Member ID","Service","Queue #","Check-in","Check-out","Duration","Notes"];
    const rows = records.map(r => { const p = people.find(x => x.name===r.name); const dur = duration(r.check_in, r.check_out, r.service); return [r.name, p?p.guest_number:"", r.type, r.member_id||"", r.service, r.queue_position||"", fmt(r.check_in), r.check_out?fmt(r.check_out):"", dur||"", (r.notes||"").replace(/,/g," ")]; });
    const csv = [hdr, ...rows].map(r => r.map(v => `"${v}"`).join(",")).join("\n");
    const a = document.createElement("a"); a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv); a.download = "checkins.csv"; a.click();
  }

  function tryPin() {
    if (showPinModal==="admin" && pinInput===ADMIN_PIN) { setAdminAuth(true); setPinError(false); setPinInput(""); setShowPinModal(null); }
    else if (showPinModal==="queue" && pinInput===QUEUE_PIN) { setQueueAuth(true); setPinError(false); setPinInput(""); setShowPinModal(null); }
    else { setPinError(true); setPinInput(""); }
  }

  async function addService() { const s = newService.trim(); if (!s || services.includes(s)) { setNewService(""); return; } await api("checkin_services", {method:"POST", body:JSON.stringify({name:s}), headers:{...HEADERS,"Prefer":"return=minimal"}}); setNewService(""); loadData(); }
  async function removeService(s) { await api(`checkin_services?name=eq.${encodeURIComponent(s)}`, {method:"DELETE"}); loadData(); }

  const filtered = records.filter(r => {
    const q = search.toLowerCase(), person = people.find(p => p.name===r.name), gn = person ? String(person.guest_number) : "";
    const m = !q || r.name.toLowerCase().includes(q) || gn.includes(q) || (r.member_id||"").toLowerCase().includes(q);
    return m && (filterType==="All" || r.type===filterType) && (filterService==="All" || r.service===filterService);
  });

  const today = records.filter(r => r.check_in >= todayISO()).length;
  const gs = records.filter(r => r.type==="Guest").length;
  const vs = records.filter(r => r.type==="Volunteer").length;
  const ac = records.filter(r => !r.check_out).length;

  if (queueAuth) return <QueueView records={records} people={people} onCheckOut={checkOut} onLogout={()=>setQueueAuth(false)} loadData={loadData}/>;

  const Tab = ({id, label}) => (
    <button onClick={()=>setView(id)} style={{flex:1,padding:"10px 0",border:"none",background:"transparent",borderBottom:view===id?"3px solid #46b4bf":"3px solid transparent",fontWeight:view===id?700:400,fontSize:13,cursor:"pointer",color:view===id?"#46b4bf":"#5A7070",fontFamily:"inherit",marginBottom:-2}}>
      {label}
    </button>
  );

  const availableServices = services.filter(s => isServiceAvailableToday(s));

  return (
    <div style={{minHeight:"100vh",background:"#F7FAFA",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"}}>
      <div style={{background:"#46b4bf",padding:"24px 20px 18px",textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:14}}><Logo/></div>
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8}}>
          {!loading && <span style={{width:8,height:8,borderRadius:"50%",background:dbError?"#F5A623":"rgba(255,255,255,0.6)",display:"inline-block"}}/>}
          <button onClick={()=>{setShowPinModal(showPinModal==="queue"?null:"queue");setPinError(false);setPinInput("");}} style={{...btnGhost,background:"rgba(255,255,255,0.15)",color:"#fff",borderColor:"rgba(255,255,255,0.3)",fontSize:12}}>Showers & Laundry</button>
          <button onClick={()=>{setShowPinModal(showPinModal==="admin"?null:"admin");setPinError(false);setPinInput("");}} style={{...btnGhost,background:"rgba(255,255,255,0.15)",color:"#fff",borderColor:"rgba(255,255,255,0.3)",fontSize:12}}>{adminAuth?"Admin":"Admin"}</button>
        </div>
      </div>

      <div style={{maxWidth:600,margin:"0 auto",padding:"24px 16px 3rem"}}>
        {dbError && <div style={{background:"#FCECEA",border:"1px solid #F0A9A3",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#C0392B"}}>{dbError}</div>}

        {showPinModal && (
          <div style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:12,padding:20,marginBottom:20}}>
            <p style={{margin:"0 0 12px",fontWeight:700,fontSize:15}}>{showPinModal==="admin"?"Admin Login":"Showers & Laundry Login"}</p>
            <div style={{display:"flex",gap:8}}>
              <input type="password" placeholder="Enter PIN" value={pinInput} onChange={e=>setPinInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryPin()} style={{...inpStyle,width:130,borderColor:pinError?"#C0392B":"#D0E6E5"}}/>
              <button onClick={tryPin} style={{...btnPrimary,padding:"10px 20px",fontSize:14}}>Login</button>
              <button onClick={()=>{setShowPinModal(null);setPinError(false);setPinInput("");}} style={btnGhost}>Cancel</button>
            </div>
            {pinError && <p style={{margin:"8px 0 0",fontSize:12,color:"#C0392B"}}>Incorrect PIN. Please try again.</p>}
          </div>
        )}

        {adminAuth && (
          <div style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:12,padding:20,marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <p style={{margin:0,fontWeight:700,fontSize:15}}>Admin panel</p>
              <button onClick={()=>setAdminAuth(false)} style={{...btnGhost,color:"#C0392B",borderColor:"#F0A9A3"}}>Log out</button>
            </div>
            <p style={{margin:"0 0 8px",fontSize:13,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Service capacity today</p>
            <div style={{display:"flex",gap:10,marginBottom:18}}>
              {Object.entries(CAPPED_SERVICES).map(([svc, cap]) => { const used = countToday(svc), pct = Math.round(used/cap*100); return (
                <div key={svc} style={{flex:1,background:"#EAF7F8",border:"1px solid #C0E8EC",borderRadius:8,padding:"10px 14px"}}>
                  <p style={{margin:"0 0 2px",fontSize:12,fontWeight:600,color:"#2E8A94"}}>{svc}</p>
                  <p style={{margin:"0 0 8px",fontSize:13,color:used>=cap?"#C0392B":"#5A7070"}}>{used}/{cap} spots used</p>
                  <div style={{height:6,borderRadius:3,background:"#C0E8EC"}}><div style={{height:6,borderRadius:3,width:`${pct}%`,background:used>=cap?"#C0392B":used/cap>0.8?"#E6A817":"#46b4bf",transition:"width 0.3s"}}/></div>
                </div>
              ); })}
            </div>
            <div style={{borderTop:"1px solid #D0E6E5",paddingTop:16,marginBottom:16}}>
              <p style={{margin:"0 0 8px",fontSize:13,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Manage people</p>
              <PeopleRemover people={people} onRemove={async(p)=>{await api(`people?id=eq.${p.id}`,{method:"DELETE"});loadData();}} onFlag={flagPerson}/>
            </div>
            <div style={{borderTop:"1px solid #D0E6E5",paddingTop:16,marginBottom:16}}>
              <p style={{margin:"0 0 8px",fontSize:13,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Service types</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                {services.map(s => (<span key={s} style={{display:"flex",alignItems:"center",gap:4,fontSize:12,padding:"4px 12px",background:"#EAF7F8",border:"1px solid #C0E8EC",borderRadius:20,color:"#2E8A94",fontWeight:500}}>{s}{CAPPED_SERVICES[s]?<span style={{fontSize:10,opacity:0.7}}> · {CAPPED_SERVICES[s]}</span>:null}<button onClick={()=>removeService(s)} style={{background:"none",border:"none",cursor:"pointer",color:"#2E8A94",padding:"0 2px",fontSize:14,lineHeight:1,opacity:0.6}}>×</button></span>))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <input placeholder="Add new service…" value={newService} onChange={e=>setNewService(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addService()} style={{...inpStyle,flex:1}}/>
                <button onClick={addService} style={{...btnOutline,padding:"8px 16px"}}>Add</button>
              </div>
            </div>
            <button onClick={exportCSV} style={{...btnOutline,width:"100%",textAlign:"center",padding:10}}>Export all check-ins as CSV ↓</button>
          </div>
        )}

        {!loading && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:10,marginBottom:14}}>
            {[["Today",today],["Guests",gs],["Volunteers",vs],["Active",ac]].map(([l,v]) => (
              <div key={l} style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:10,padding:"12px 10px",textAlign:"center"}}>
                <p style={{margin:0,fontSize:22,fontWeight:700,color:"#46b4bf"}}>{v}</p>
                <p style={{margin:0,fontSize:11,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>{l}</p>
              </div>
            ))}
          </div>
        )}

        {!loading && (
          <div style={{display:"flex",gap:10,marginBottom:20}}>
            {Object.entries(CAPPED_SERVICES).map(([svc, cap]) => { const used = countToday(svc), full = used>=cap; return (
              <div key={svc} style={{flex:1,background:full?"#FCECEA":"#EAF7F8",border:`1.5px solid ${full?"#F0A9A3":"#C0E8EC"}`,borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,fontWeight:600,color:full?"#C0392B":"#2E8A94"}}>{svc}</span>
                <span style={{fontSize:12,fontWeight:500,color:full?"#C0392B":"#46b4bf",background:full?"transparent":"#fff",padding:"2px 10px",borderRadius:20,border:`1px solid ${full?"#F0A9A3":"#C0E8EC"}`}}>{full?"Full":`${cap-used} left`}</span>
              </div>
            ); })}
          </div>
        )}

        <div style={{display:"flex",borderBottom:"2px solid #C0E8EC",marginBottom:24}}>
          <Tab id="checkin" label="Check in"/>
          <Tab id="log" label={`Visit log (${records.length})`}/>
          {adminAuth && <Tab id="analytics" label="Analytics"/>}
        </div>

        {view==="checkin" && (
          <div>
            {flagAlert && (
              <div style={{background:"#FFF0F0",border:`2px solid #C0392B`,borderRadius:10,padding:"14px 16px",marginBottom:20}}>
                <p style={{margin:"0 0 4px",fontSize:15,fontWeight:700,color:"#C0392B"}}>⚑ This person is not allowed on the premises</p>
                <p style={{margin:"0 0 2px",fontSize:13,color:"#C0392B"}}><strong>{flagAlert.name}</strong> — Guest #{flagAlert.guest_number}</p>
                {flagAlert.flag_reason && <p style={{margin:0,fontSize:12,color:"#C0392B"}}>Reason: {flagAlert.flag_reason}</p>}
                <p style={{margin:"8px 0 0",fontSize:12,color:"#5A7070"}}>Please contact a staff member. Check-in has been blocked.</p>
              </div>
            )}
            {success && !flagAlert && (
              <div style={{background:"#EAF7F8",border:"1.5px solid #C0E8EC",borderRadius:10,padding:"14px 16px",marginBottom:20}}>
                <p style={{margin:"0 0 4px",fontSize:15,fontWeight:700,color:"#2E8A94"}}>{success.isNew?`Welcome, ${success.name}! You've been registered.`:`Welcome back, ${success.name}!`}</p>
                <p style={{margin:"0 0 2px",fontSize:13,color:"#46b4bf"}}>Guest number: <strong>#{success.guestNumber}</strong></p>
                {success.position && <p style={{margin:0,fontSize:13,color:"#46b4bf"}}>Queue position for {success.service}: <strong>#{success.position}</strong></p>}
              </div>
            )}
            {errors.submit && <div style={{background:"#FCECEA",border:"1px solid #F0A9A3",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#C0392B"}}>{errors.submit}</div>}

            <p style={{margin:"0 0 8px",fontSize:13,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Visitor type</p>
            <div style={{display:"flex",gap:10,marginBottom:18}}>
              {["Guest","Volunteer"].map(t => (
                <button key={t} onClick={()=>setForm(f=>({...f,type:t}))} style={{flex:1,padding:"10px 0",borderRadius:8,border:form.type===t?"2px solid #46b4bf":"1.5px solid #D0E6E5",background:form.type===t?"#EAF7F8":"#fff",fontWeight:form.type===t?700:400,fontSize:14,cursor:"pointer",color:form.type===t?"#2E8A94":"#5A7070",fontFamily:"inherit"}}>
                  {t}
                </button>
              ))}
            </div>

            <p style={{margin:"0 0 6px",fontSize:13,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Search by name or guest number</p>
            <div style={{marginBottom:4,position:"relative"}} ref={suggestRef}>
              <div style={{display:"flex",gap:8,marginBottom:4}}>
                <input placeholder="Full name…" value={form.name} onChange={e=>handleNameInput(e.target.value)} style={{...inpStyle,flex:1,borderColor:errors.name?"#C0392B":"#D0E6E5"}}/>
                <input placeholder="Guest # (e.g. 1001)" value={form.guestNumber} onChange={e=>handleGuestNumberInput(e.target.value)} style={{...inpStyle,width:160}}/>
              </div>
              {errors.name && <p style={{margin:"0 0 8px",fontSize:12,color:"#C0392B"}}>{errors.name}</p>}
              {showSuggestions && suggestions.length > 0 && (
                <div style={{position:"absolute",top:"calc(100% - 4px)",left:0,right:0,background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:10,zIndex:10,boxShadow:"0 6px 20px rgba(70,180,191,0.15)",overflow:"hidden"}}>
                  {suggestions.map(p => { const av = avColor(p.name); return (
                    <div key={p.id} onClick={()=>selectPerson(p)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid #D0E6E5",background:p.flagged?"#FFF5F5":"#fff"}} onMouseEnter={e=>e.currentTarget.style.background=p.flagged?"#FFE8E8":"#EAF7F8"} onMouseLeave={e=>e.currentTarget.style.background=p.flagged?"#FFF5F5":"#fff"}>
                      <div style={{width:34,height:34,borderRadius:"50%",background:av.bg,color:av.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,flexShrink:0}}>{initials(p.name)||"?"}</div>
                      <div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:600}}>{p.name}</p><p style={{margin:0,fontSize:12,color:"#5A7070"}}>Guest #{p.guest_number}</p></div>
                      {p.flagged && <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#FCECEA",color:"#C0392B",fontWeight:600,flexShrink:0}}>⚑ Flagged</span>}
                    </div>
                  ); })}
                </div>
              )}
            </div>

            <div style={{marginBottom:14,marginTop:10}}>
              <select value={form.service} onChange={ev=>{setForm(f=>({...f,service:ev.target.value}));setErrors(e=>({...e,service:undefined}));}} style={{...inpStyle,borderColor:errors.service?"#C0392B":"#D0E6E5"}}>
                <option value="">Select service / reason for visit…</option>
                {availableServices.map(s => { const cap=CAPPED_SERVICES[s], used=cap?countToday(s):0, full=cap&&used>=cap; return <option key={s} value={s} disabled={full}>{s}{cap?` (${used}/${cap}${full?" — Full":""})`:""}</option>; })}
              </select>
              {errors.service && <p style={{margin:"4px 0 0",fontSize:12,color:"#C0392B"}}>{errors.service}</p>}
            </div>

            <div style={{marginBottom:22}}>
              <textarea placeholder="Notes (optional)" value={form.notes} onChange={ev=>setForm(f=>({...f,notes:ev.target.value}))} rows={3} style={{...inpStyle,resize:"vertical"}}/>
            </div>

            <button onClick={submit} disabled={saving||!!flagAlert} style={{...btnPrimary,width:"100%",padding:13,fontSize:16,opacity:(saving||!!flagAlert)?0.5:1,cursor:flagAlert?"not-allowed":"pointer"}}>
              {saving ? "Saving…" : "Check in"}
            </button>
          </div>
        )}

        {view==="log" && (
          <div>
            {!adminAuth ? (
              <div style={{background:"#FEF7E6",border:"1px solid #F5D48A",borderRadius:8,padding:"12px 16px",marginBottom:16,fontSize:13,color:"#8A5A00"}}>
                Staff login required to view the visit log. Click "Staff login" above.
              </div>
            ) : (
              <>
                <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
                  <input placeholder="Search by name or guest #…" value={search} onChange={e=>setSearch(e.target.value)} style={{...inpStyle,flex:1,minWidth:140}}/>
                  <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{...inpStyle,width:110}}><option>All</option><option>Guest</option><option>Volunteer</option></select>
                  <select value={filterService} onChange={e=>setFilterService(e.target.value)} style={{...inpStyle,width:150}}><option>All</option>{services.map(s=><option key={s}>{s}</option>)}</select>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <p style={{margin:0,fontSize:12,color:"#5A7070"}}>{people.length} people in directory</p>
                  <button onClick={loadData} style={btnGhost}>Refresh ↻</button>
                </div>
                {loading ? <p style={{color:"#5A7070",fontSize:14,textAlign:"center",padding:"2rem 0"}}>Loading…</p>
                : filtered.length===0 ? <p style={{color:"#5A7070",fontSize:14,textAlign:"center",padding:"2rem 0"}}>No records found.</p>
                : filtered.map(r => {
                  const av = avColor(r.name), dur = duration(r.check_in, r.check_out, r.service), person = people.find(p => p.name===r.name), isFlagged = person?.flagged;
                  return (
                    <div key={r.id} style={{background:isFlagged?"#FFF5F5":"#fff",border:`1.5px solid ${isFlagged?"#F0A9A3":"#D0E6E5"}`,borderRadius:12,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"flex-start",gap:12}}>
                      <div style={{width:42,height:42,borderRadius:"50%",background:av.bg,color:av.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,flexShrink:0}}>{initials(r.name)||"?"}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
                          <span style={{fontWeight:700,fontSize:14}}>{r.name}</span>
                          {person && <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#EAF7F8",color:"#2E8A94",fontWeight:500}}>#{person.guest_number}</span>}
                          {isFlagged && <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#FCECEA",color:"#C0392B",fontWeight:600}}>⚑ Flagged</span>}
                          <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:r.type==="Volunteer"?"#EAF7F8":"#EEEEFB",color:r.type==="Volunteer"?"#2E8A94":"#3A3A8C",fontWeight:500}}>{r.type}</span>
                          {r.queue_position && <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#FEF7E6",color:"#8A5A00",fontWeight:500}}>Queue #{r.queue_position}</span>}
                          {!r.check_out && <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#EAF7F8",color:"#46b4bf",fontWeight:500}}>Active</span>}
                        </div>
                        <p style={{margin:"2px 0",fontSize:12,color:"#5A7070",fontWeight:500}}>{r.service}</p>
                        <p style={{margin:0,fontSize:11,color:"#8AA5A5"}}>In: {fmt(r.check_in)}{r.check_out?` · Out: ${fmt(r.check_out)}${dur?` · ${dur}`:""}`:""}</p>
                        {r.notes && <p style={{margin:"4px 0 0",fontSize:12,color:"#5A7070",fontStyle:"italic"}}>{r.notes}</p>}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
                        {!r.check_out && <button onClick={()=>checkOut(r.id)} style={{...btnOutline,fontSize:12,padding:"5px 10px"}}>Check out</button>}
                        <button onClick={()=>deleteRecord(r.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#8AA5A5",fontSize:18,padding:"0 4px",lineHeight:1,alignSelf:"flex-end"}}>×</button>
                      </div>
                    </div>
                  );
                })}
              </>
            )}
          </div>
        )}

        {view==="analytics" && adminAuth && <AnalyticsTab records={records}/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
