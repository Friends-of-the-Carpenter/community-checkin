function api(path, opts={}) {
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: HEADERS, ...opts });
}
function isServiceAvailableToday(s) {
  const days = CAPPED_SERVICES_DAYS[s];
  if (!days) return true;
  return days.includes(new Date().getDay());
}
function todayISO() { const d=new Date(); d.setHours(0,0,0,0); return d.toISOString(); }
function initials(name) { return name.trim().split(" ").filter(Boolean).map(w=>w[0].toUpperCase()).slice(0,2).join(""); }
function fmt(iso) {
  if (!iso) return "";
  const d=new Date(iso);
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})+" "+d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}
function fmtDate(iso) { if(!iso)return""; return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function fmtMonth(iso) { return new Date(iso).toLocaleDateString("en-US",{month:"short",year:"numeric"}); }
function duration(inT,outT,service) {
  if (!outT||NO_DURATION_SERVICES.includes(service)) return null;
  const m=Math.round((new Date(outT)-new Date(inT))/60000);
  return m<60?`${m}m`:`${Math.floor(m/60)}h ${m%60}m`;
}
function isoToLocalInput(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function localInputToIso(val) { if (!val) return null; return new Date(val).toISOString(); }
function nextAvailablePosition(service, records) {
  const cap = CAPPED_SERVICES[service];
  const todayRecords = records.filter(r => r.service === service && r.check_in >= todayISO());
  const activeRecords = todayRecords.filter(r => !r.check_out);
  if (activeRecords.length === 0) return 1;
  const max = todayRecords.reduce((m, r) => Math.max(m, r.queue_position || 0), 0);
  const next = max + 1;
  if (cap && next > cap) return 1;
  return next;
}

const AV_COLORS=[{bg:"#C2E8E6",color:"#1D5C5A"},{bg:"#B8DFE8",color:"#1A4A5C"},{bg:"#C8E6D4",color:"#1A5C35"},{bg:"#E6D4C8",color:"#5C3A1A"},{bg:"#D4C8E6",color:"#3A1A5C"}];
function avColor(name) { let h=0; for(let c of name)h=(h*31+c.charCodeAt(0))&0xffff; return AV_COLORS[h%AV_COLORS.length]; }
const emptyForm = {name:"",guestNumber:"",memberId:"",type:"Guest",service:"",notes:"",addShowers:false,addLaundry:false};

function LiveClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t=setInterval(()=>setNow(new Date()),1000); return()=>clearInterval(t); }, []);
  const date = now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  const time = now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  return <p style={{margin:"12px 0 4px",fontSize:20,color:"#fff",fontWeight:900}}>{date} | {time}</p>;
}

  return <img src="https://cdn.shopify.com/s/files/1/0582/8719/4214/files/FOC_Logo_white.png?v=1773347276" alt="Friends of the Carpenter" style={{height:120,width:"auto"}}/>;
}

function QRCodeDisplay({ guestNumber }) {
  const divRef = useRef(null);
  const code = `${QR_PREFIX}${guestNumber}`;
  useEffect(() => {
    if (!divRef.current) return;
    divRef.current.innerHTML = "";
    if (typeof QRCode === "undefined") { divRef.current.innerHTML='<p style="color:red;font-size:14px">QR library not loaded</p>'; return; }
    try { new QRCode(divRef.current,{text:code,width:200,height:200,colorDark:"#1D2B2B",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M}); }
    catch(e) { divRef.current.innerHTML='<p style="color:red;font-size:14px">QR error: '+e.message+'</p>'; }
  },[code]);
  function download() {
    if (!divRef.current) return;
    const img=divRef.current.querySelector("img"),canvas=divRef.current.querySelector("canvas");
    const src=img?img.src:canvas?canvas.toDataURL("image/png"):null;
    if (!src) return;
    const a=document.createElement("a");a.href=src;a.download=`-${guestNumber}-qr.png`;a.click();
  }
  return (
    <div style={{textAlign:"center"}}>
      <div ref={divRef} style={{display:"inline-block",borderRadius:10,border:"1.5px solid #D0E6E5",overflow:"hidden"}}/>
      <p style={{margin:"8px 0 0",fontSize:13,color:"#8AA5A5"}}>{code}</p>
      <button onClick={download} style={{...btnOutline,marginTop:10,fontSize:14,padding:"6px 16px"}}>Download QR</button>
    </div>
  );
}

function ScanToast({ result, onDone }) {
  useEffect(()=>{const t=setTimeout(onDone,4000);return()=>clearTimeout(t);},[]);
  const isCheckOut=result.action==="checkout", isError=result.action==="error";
  return (
    <div className="scan-toast" style={{background:isError?"#FCECEA":isCheckOut?"#FEF7E6":"#EAF7F8",border:`2px solid ${isError?"#F0A9A3":isCheckOut?"#F5D48A":"#C0E8EC"}`,borderRadius:14,padding:"20px 22px",marginBottom:24}}>
      <p style={{margin:"0 0 4px",fontSize:19,fontWeight:700,color:isError?"#C0392B":isCheckOut?"#8A5A00":"#2E8A94"}}>
        {isError?"⚠ Not found":isCheckOut?"👋 Checked out":"✓ Checked in"}
      </p>
      {!isError&&<p style={{margin:0,fontSize:16,color:"#1D2B2B"}}><strong>{result.name}</strong> —  #{result.guestNumber}</p>}
      {isError&&<p style={{margin:0,fontSize:15,color:"#C0392B"}}>{result.message}</p>}
      {!isError&&isCheckOut&&result.duration&&<p style={{margin:"6px 0 0",fontSize:14,color:"#8A5A00"}}>Duration: {result.duration}</p>}
    </div>
  );
}

}
function SimpleBarChart({data,keys,colors,height=200}) {
  const containerRef = useRef(null);
  const [containerWidth, setContainerWidth] = useState(320);

  useEffect(()=>{
    if(!containerRef.current) return;
    const ro = new ResizeObserver(entries=>{
      for(let e of entries) setContainerWidth(e.contentRect.width);
    });
    ro.observe(containerRef.current);
    return()=>ro.disconnect();
  },[]);

  if(!data||data.length===0) return <p style={{textAlign:"center",color:"#5A7070",fontSize:15,padding:"1rem 0"}}>No data for this period.</p>;
  const maxVal=Math.max(1,...data.flatMap(d=>keys.map(k=>d[k]||0)));
  const groupW=Math.max(keys.length*16+8, Math.floor(containerWidth/data.length)-4);
  const barW=Math.max(8,Math.floor((groupW-8)/keys.length));
  return (
    <div ref={containerRef} style={{overflowX:"auto"}}>
      <div style={{display:"flex",alignItems:"flex-end",gap:4,height,minWidth:data.length*(groupW+4),paddingBottom:15}}>
        {data.map((d,i)=>(
          <div key={i} style={{display:"flex",alignItems:"flex-end",gap:2,flexShrink:0,width:groupW}}>
            {keys.map(k=>{
              const pct=(d[k]||0)/maxVal*100;
              return (
                <div key={k} style={{width:barW,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  {d[k]>0&&<span style={{fontSize:14,color:"#5A7070"}}>{d[k]}</span>}
                  <div style={{width:"100%",height:`${pct*(height-36)/100}px`,background:colors[k],borderRadius:"3px 3px 0 0",minHeight:d[k]>0?4:0}}/>
                </div>
              );
            })}
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:4,overflowX:"auto",paddingTop:4}}>
        {data.map((d,i)=><span key={i} style={{fontSize:14,color:"#8AA5A5",flexShrink:0,width:groupW+4,textAlign:"center",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{d.date}</span>)}
      </div>
    </div>
  );
}

function SimpleLineChart({data,height=200}) {
  if(!data||data.length===0) return <p style={{textAlign:"center",color:"#5A7070",fontSize:15,padding:"1rem 0"}}>No completed volunteer check-outs for this period.</p>;
  if(data.length===1){
    const fmtH=hrs=>{const hh=Math.floor(hrs),mm=Math.round((hrs%1)*60);return mm>0?`${hh}h ${mm}m`:`${hh}h`;};
    return (
      <div style={{textAlign:"center",padding:"20px 0"}}>
        <p style={{margin:0,fontSize:36,fontWeight:700,color:CHART_COLORS["Volunteer"]}}>{fmtH(data[0].hours)}</p>
        <p style={{margin:"6px 0 0",fontSize:14,color:"#5A7070"}}>{data[0].date}</p>
      </div>
    );
  }
  const maxVal=Math.max(1,...data.map(d=>d.hours));
  const w=600,h=height-30,pad=10;
  const pts=data.map((d,i)=>({x:pad+(i/Math.max(data.length-1,1))*(w-pad*2),y:h-(d.hours/maxVal)*(h-pad*2)-pad,d}));
  const pathD=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
  const fmtH=hrs=>{const hh=Math.floor(hrs),mm=Math.round((hrs%1)*60);return mm>0?`${hh}h ${mm}m`:`${hh}h`;};
  return (
    <div style={{overflowX:"auto"}}>
      <svg viewBox={`0 0 ${w} ${height}`} style={{width:"100%",height}}>
        {[0,0.25,0.5,0.75,1].map(t=><line key={t} x1={pad} x2={w-pad} y1={h-(t*(h-pad*2))-pad} y2={h-(t*(h-pad*2))-pad} stroke="#D0E6E5" strokeDasharray="3 3"/>)}
        <path d={pathD} fill="none" stroke={CHART_COLORS["Volunteer"]} strokeWidth={3} strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <g key={i}>
            <circle cx={p.x} cy={p.y} r={5} fill={CHART_COLORS["Volunteer"]}/>
            <text x={p.x} y={p.y-10} textAnchor="middle" fontSize={13} fill="#5A7070">{fmtH(p.d.hours)}</text>
            <text x={p.x} y={height-4} textAnchor="middle" fontSize={13} fill="#8AA5A5">{p.d.date}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function ManualAddToQueue({ svc, people, records, numLabel, onAdd }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const [selected, setSelected] = useState(null);
  const [customPos, setCustomPos] = useState("");
  const [suggestions, setSuggestions] = useState([]);
  const [showSug, setShowSug] = useState(false);
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState(null);
  const ref = useRef(null);
  const nextPos = nextAvailablePosition(svc, records);

  useEffect(() => {
    function h(e) { if (ref.current && !ref.current.contains(e.target)) setShowSug(false); }
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  function handleQuery(val) {
    setQuery(val); setSelected(null); setErr(null);
    if (!val.trim()) { setSuggestions([]); setShowSug(false); return; }
    const q = val.toLowerCase();
    const m = people.filter(p => p.name.toLowerCase().includes(q) || String(p.guest_number).includes(q)).slice(0,6);
    setSuggestions(m); setShowSug(m.length > 0);
  }

  async function selectPerson(p){
  setForm(f=>({...f,name:p.name,guestNumber:String(p.guest_number)}));
  setSuggestions([]);setShowSuggestions(false);setErrors(e=>({...e,name:undefined}));
  if(p.flagged){
    setFlagAlert(p);
    await api("checkin_records",{method:"POST",body:JSON.stringify({name:p.name,type:"Guest",service:FLAG_ALERT_SERVICE,notes:p.flag_reason||null,check_in:new Date().toISOString(),check_out:null}),headers:{...HEADERS,"Prefer":"return=minimal"}});
    await loadData();
  } else { setFlagAlert(null); }
}

  async function handleAdd() {
    if (!query.trim()) { setErr("Please enter a name."); return; }
    const pos = customPos !== "" ? parseInt(customPos, 10) : nextPos;
    if (!pos || pos < 1) { setErr("Please enter a valid position number."); return; }
    setSaving(true);
    try {
      let personToAdd = selected;
      if (!personToAdd) {
        const existing = people.find(p => p.name.toLowerCase() === query.trim().toLowerCase());
        if (existing) { personToAdd = existing; }
        else {
          const res = await api("people", { method:"POST", body:JSON.stringify({name:query.trim()}), headers:{...HEADERS,"Prefer":"return=representation"} });
          if (!res.ok) throw new Error("Failed to register person.");
          const [np] = await res.json(); personToAdd = np;
        }
      }
      if (personToAdd.flagged) { setErr("This person is flagged and cannot be added."); setSaving(false); return; }
      const res = await api("checkin_records", { method:"POST", body:JSON.stringify({name:personToAdd.name,type:"Guest",service:svc,queue_position:pos,check_in:new Date().toISOString(),check_out:null}), headers:{...HEADERS,"Prefer":"return=minimal"} });
      if (!res.ok) throw new Error("Failed to add to queue.");
      onAdd(); setOpen(false); setQuery(""); setSelected(null); setCustomPos(""); setErr(null);
    } catch(e) { setErr(e.message || "Failed to add. Please try again."); }
    setSaving(false);
  }

  return (
    <div style={{marginTop:14,borderTop:"1px solid #D0E6E5",paddingTop:14}}>
      {!open ? (
        <button onClick={()=>setOpen(true)} style={{...btnOutline,width:"100%",fontSize:15,padding:"11px 0"}}>+ Add to {svc} queue</button>
      ) : (
        <div>
          <p style={{margin:"0 0 10px",fontSize:14,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Add to {svc} queue</p>
          <div style={{position:"relative",marginBottom:10}} ref={ref}>
            <input placeholder="Type a name — existing or new…" value={query} onChange={e=>handleQuery(e.target.value)} style={{...inpStyle,borderColor:err?"#C0392B":"#D0E6E5"}}/>
            {showSug&&suggestions.length>0&&(
              <div style={{position:"absolute",top:"calc(100% + 2px)",left:0,right:0,background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:12,zIndex:20,boxShadow:"0 6px 20px rgba(70,180,191,0.15)",overflow:"hidden"}}>
                {suggestions.map(p=>{
                  const av=avColor(p.name);
                  return (
                    <div key={p.id} onClick={()=>selectPerson(p)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",cursor:"pointer",borderBottom:"1px solid #D0E6E5",background:p.flagged?"#FFF5F5":"#fff"}}
                      onMouseEnter={e=>e.currentTarget.style.background=p.flagged?"#FFE8E8":"#EAF7F8"}
                      onMouseLeave={e=>e.currentTarget.style.background=p.flagged?"#FFF5F5":"#fff"}>
                      <div style={{width:36,height:36,borderRadius:"50%",background:av.bg,color:av.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}}>{initials(p.name)||"?"}</div>
                      <div style={{flex:1}}><p style={{margin:0,fontSize:15,fontWeight:600}}>{p.name}</p></div>
                      {p.flagged&&<span style={{fontSize:12,padding:"2px 10px",borderRadius:20,background:"#FCECEA",color:"#C0392B",fontWeight:600}}>⚑</span>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          {query.trim()&&!selected&&suggestions.length===0&&(
            <p style={{margin:"-4px 0 10px",fontSize:13,color:C.tealDark}}>✦ "{query.trim()}" will be registered as a new person.</p>
          )}
          <div style={{marginBottom:10}}>
            <input type="number" min="1" placeholder={`${numLabel} # (default: ${nextPos})`} value={customPos} onChange={e=>setCustomPos(e.target.value)} style={{...inpStyle}}/>
          </div>
          {err&&<p style={{margin:"0 0 8px",fontSize:14,color:C.danger}}>⚠ {err}</p>}
          <div style={{display:"flex",gap:10}}>
            <button onClick={handleAdd} disabled={saving} style={{...btnPrimary,flex:1,fontSize:15,padding:"12px 0",opacity:saving?0.5:1}}>{saving?"Adding…":"Add to queue"}</button>
            <button onClick={()=>{setOpen(false);setQuery("");setSelected(null);setCustomPos("");setErr(null);}} style={{...btnGhost,fontSize:15}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}
function AssignQueueNumber({ r, numLabel, onUpdate }) {

function ShowerLaundryPanel({ records, people, onMarkComplete, onCancel, onManualAdd }) {
  const services = Object.keys(CAPPED_SERVICES);
  return (
    <>
      {services.map(svc => {
        const cap=CAPPED_SERVICES[svc];
        const queue=records.filter(r=>r.service===svc&&r.check_in>=todayISO()).sort((a,b)=>{
          if(!a.queue_position&&!b.queue_position) return 0;
          if(!a.queue_position) return 1;
          if(!b.queue_position) return -1;
          return a.queue_position-b.queue_position;
        });
        const active=queue.filter(r=>!r.check_out);
        const done=queue.filter(r=>r.check_out);
        const used=queue.length;
        const pct=Math.round(used/cap*100);
        const numLabel=svc==="Showers"?"Shower":"Laundry";
        return (
          <div key={svc} style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:14,padding:24,marginBottom:20}}>

              <h3 style={{margin:0,fontSize:20,fontWeight:700}}>{svc}</h3>
              <span style={{fontSize:15,fontWeight:600,color:used>=cap?"#C0392B":"#46b4bf",background:used>=cap?"#FCECEA":"#EAF7F8",padding:"5px 14px",borderRadius:20}}>
                {used>=cap?"Full":`${cap-used} spots left`}

            </div>
            <div style={{height:10,borderRadius:5,background:"#EAF7F8",marginBottom:16}}>
              <div style={{height:10,borderRadius:5,width:`${pct}%`,background:used>=cap?"#C0392B":used/cap>0.8?"#E6A817":"#46b4bf",transition:"width 0.3s"}}/>
            </div>
            <div style={{display:"flex",gap:28,marginBottom:18,paddingBottom:16,borderBottom:"1px solid #D0E6E5"}}>

            {active.map(r=>{
              const av=avColor(r.name);

                  <div style={{width:44,height:44,borderRadius:"50%",background:av.bg,color:av.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15,flexShrink:0}}>{initials(r.name)||"?"}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontWeight:600,fontSize:16}}>{r.name}</span>

                </div>
              );

            {done.length>0&&(
              <details style={{marginTop:10}}>
                <summary style={{fontSize:14,color:"#5A7070",cursor:"pointer",userSelect:"none"}}>Show completed ({done.length})</summary>

function CheckoutTimeEditor({ records, people, onUpdate }) {
  const [search,setSearch]=useState("");
  const [editingId,setEditingId]=useState(null);
  const [editVal,setEditVal]=useState("");
  const [saving,setSaving]=useState(false);
  const [saveMsg,setSaveMsg]=useState(null);
  const q=search.trim().toLowerCase();
  const matched=q.length>0?records.filter(r=>r.name.toLowerCase().includes(q)).slice(0,8):[];

  async function save(r) {
    if (!editVal) return;
    const newOut=localInputToIso(editVal);
    if (new Date(newOut)<=new Date(r.check_in)){setSaveMsg({id:r.id,type:"error",text:"Check-out must be after check-in."});return;}
    setSaving(true);
    try {
      const res=await api(`checkin_records?id=eq.${r.id}`,{method:"PATCH",body:JSON.stringify({check_out:newOut}),headers:{...HEADERS,"Prefer":"return=minimal"}});
      if (!res.ok) throw new Error();
      setSaveMsg({id:r.id,type:"ok",text:"Saved!"}); setEditingId(null); onUpdate();
      setTimeout(()=>setSaveMsg(null),2500);
    } catch(_){setSaveMsg({id:r.id,type:"error",text:"Failed to save. Try again."});}
    setSaving(false);
  }

  async function clearCheckout(r) {
    setSaving(true);
    try {
      const res=await api(`checkin_records?id=eq.${r.id}`,{method:"PATCH",body:JSON.stringify({check_out:null}),headers:{...HEADERS,"Prefer":"return=minimal"}});
      if (!res.ok) throw new Error();
      setSaveMsg({id:r.id,type:"ok",text:"Check-out cleared."}); setEditingId(null); onUpdate();
      setTimeout(()=>setSaveMsg(null),2500);
    } catch(_){setSaveMsg({id:r.id,type:"error",text:"Failed to clear. Try again."});}
    setSaving(false);
  }

  return (
    <div>
      <input placeholder="Search by name…" value={search} onChange={e=>{setSearch(e.target.value);setEditingId(null);setSaveMsg(null);}} style={{...inpStyle,marginBottom:10}}/>
      {q.length>0&&matched.length===0&&<p style={{fontSize:14,color:C.textMuted}}>No records found.</p>}
      {matched.map(r=>{
        const av=avColor(r.name),isEditing=editingId===r.id,msg=saveMsg?.id===r.id?saveMsg:null;
        return (
          <div key={r.id} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:10,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px"}}>
              <div style={{width:40,height:40,borderRadius:"50%",background:av.bg,color:av.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,flexShrink:0}}>{initials(r.name)||"?"}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontWeight:600,fontSize:15}}>{r.name}</span>

                  {!r.check_out&&<span style={{fontSize:13,padding:"2px 8px",borderRadius:20,background:"#EAF7F8",color:"#46b4bf",fontWeight:500}}>Active</span>}
                </div>
                <p style={{margin:"3px 0 0",fontSize:13,color:C.textLight}}>In: {fmt(r.check_in)}{r.check_out?` · Out: ${fmt(r.check_out)}`:" · No check-out yet"}</p>
              </div>
              <button onClick={()=>{setEditingId(isEditing?null:r.id);setEditVal(isoToLocalInput(r.check_out));setSaveMsg(null);}} style={{...btnGhost,fontSize:14,color:C.teal,borderColor:C.tealMid,flexShrink:0}}>
                {isEditing?"Cancel":r.check_out?"Edit time":"Set time"}
              </button>
            </div>
            {isEditing&&(
              <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`,background:C.bg}}>
                <p style={{margin:"0 0 8px",fontSize:14,color:C.textMuted}}>Set check-out time <span style={{color:C.textLight}}>(check-in: {fmt(r.check_in)})</span></p>

                  <button onClick={()=>save(r)} disabled={saving||!editVal} style={{...btnPrimary,padding:"11px 20px",fontSize:15,opacity:saving||!editVal?0.5:1}}>{saving?"Saving…":"Save"}</button>

function AnalyticsTab({records}) {
  const [range,setRange]=useState("today");
  function getFiltered() {
    const now=new Date(); let cutoff;
    if(range==="today"){cutoff=new Date(now);cutoff.setHours(0,0,0,0);}
    else if(range==="7days"){cutoff=new Date(now);cutoff.setDate(cutoff.getDate()-6);}
    else if(range==="30days"){cutoff=new Date(now);cutoff.setDate(cutoff.getDate()-29);}
    else if(range==="month"){cutoff=new Date(now.getFullYear(),now.getMonth(),1);}
    else if(range==="quarter"){const q=Math.floor(now.getMonth()/3);cutoff=new Date(now.getFullYear(),q*3,1);}
    else if(range==="year"){cutoff=new Date(now.getFullYear(),0,1);}
    else{cutoff=new Date(0);}
    cutoff.setHours(0,0,0,0);
    return records.filter(r=>new Date(r.check_in)>=cutoff&&r.service!==FLAG_ALERT_SERVICE);
  }
  function meetsMinDuration(r){if(NO_DURATION_SERVICES.includes(r.service))return true;if(!r.check_out)return false;return(new Date(r.check_out)-new Date(r.check_in))/60000>=MIN_DURATION_MINUTES;}
  function getKey(r){return range==="year"?fmtMonth(r.check_in):fmtDate(r.check_in);}
  function groupBy(recs){const map={};recs.forEach(r=>{const k=getKey(r);if(!map[k])map[k]={date:k};CHART_SERVICES.forEach(s=>{if(!map[k][s])map[k][s]=0;});map[k][r.service]=(map[k][r.service]||0)+1;});return Object.values(map).sort((a,b)=>new Date(a.date)>new Date(b.date)?1:-1);}
  function getVolHours(recs){const map={};recs.filter(r=>r.service==="Volunteer"&&r.check_out).forEach(r=>{const k=getKey(r);if(!map[k])map[k]={date:k,hours:0};map[k].hours+=(new Date(r.check_out)-new Date(r.check_in))/3600000;});return Object.values(map).sort((a,b)=>new Date(a.date)>new Date(b.date)?1:-1);}
  const filtered=getFiltered().filter(meetsMinDuration);
  const chartData=groupBy(filtered);
  const volHours=getVolHours(filtered);
  const totals={};CHART_SERVICES.forEach(s=>{totals[s]=filtered.filter(r=>r.service===s).length;});
  const ranges=[{id:"today",label:"Today"},{id:"7days",label:"7 days"},{id:"30days",label:"30 days"},{id:"month",label:"This month"},{id:"quarter",label:"This quarter"},{id:"year",label:"This year"},{id:"all",label:"All time"}];
  return (    <div>
      <div style={{display:"flex",gap:8,marginBottom:24,flexWrap:"wrap"}}>
        {ranges.map(r=><button key={r.id} onClick={()=>setRange(r.id)} style={{...btnGhost,fontSize:14,background:range===r.id?"#46b4bf":"transparent",color:range===r.id?"#fff":"#5A7070",borderColor:range===r.id?"#46b4bf":"#D0E6E5",padding:"8px 16px"}}>{r.label}</button>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:14,marginBottom:28}}>
        {CHART_SERVICES.map(s=>(
          <div key={s} style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:12,padding:"18px 16px",textAlign:"center"}}>
            <p style={{margin:0,fontSize:34,fontWeight:700,color:CHART_COLORS[s]}}>{totals[s]||0}</p>
            <p style={{margin:"6px 0 0",fontSize:14,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.04em",wordBreak:"break-word",lineHeight:1.3}}>{s}</p>
          </div>
        ))}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:12,marginBottom:20}}>
        {CHART_SERVICES.map(s=><div key={s} style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:12,height:12,borderRadius:"50%",background:CHART_COLORS[s]}}/><span style={{fontSize:14,color:"#5A7070"}}>{s}</span></div>)}
      </div>
      {chartData.length===0?<p style={{textAlign:"center",color:"#5A7070",padding:"2rem 0",fontSize:16}}>No data for this period.</p>:(
        <>
          <div style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:14,padding:20,marginBottom:20}}>
            <p style={{margin:"0 0 16px",fontSize:15,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Showers & Laundry</p>
            <SimpleBarChart data={chartData} keys={["Showers","Laundry"]} colors={{"Showers":CHART_COLORS["Showers"],"Laundry":CHART_COLORS["Laundry"]}}/>
          </div>
          <div style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:14,padding:20,marginBottom:20,overflow:"hidden"}}>
            <p style={{margin:"0 0 16px",fontSize:15,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Day Center, Community Partnership & Drop-in</p>
            <div style={{overflowX:"auto"}}>
              <SimpleBarChart data={chartData} keys={["Day Center","Community Partnership","Drop-in"]} colors={{"Day Center":CHART_COLORS["Day Center"],"Community Partnership":CHART_COLORS["Community Partnership"],"Drop-in":CHART_COLORS["Drop-in"]}}/>
            </div>
          </div>
          <div style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:14,padding:20,marginBottom:20}}>
            <p style={{margin:"0 0 16px",fontSize:15,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Volunteer hours</p>
            <SimpleLineChart data={volHours}/>
          </div>
        </>
      )}
    </div>
  );
}

  return (
    <div style={{marginBottom:18,marginTop:14}}>
      <p style={{margin:"0 0 10px",fontSize:15,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Reason For Your Visit Today</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:12}}>
        {availableServices.map(s=>{
          const cap=CAPPED_SERVICES[s],used=cap?countToday(s):0,full=cap&&used>=cap,isSelected=form.service===s;
          return (
            <button key={s} disabled={full} onClick={()=>{if(!full){setForm(f=>({...f,service:s,addShowers:false,addLaundry:false}));setErrors(e=>({...e,service:undefined}));}}}
              style={{padding:"22px 10px",borderRadius:14,border:isSelected?"2px solid #46b4bf":"1.5px solid #D0E6E5",background:isSelected?"#EAF7F8":full?"#F7FAFA":"#fff",color:isSelected?"#2E8A94":full?"#B0C4C4":"#1D2B2B",fontWeight:isSelected?700:500,fontSize:16,cursor:full?"not-allowed":"pointer",fontFamily:"inherit",textAlign:"center",lineHeight:1.3,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,opacity:full?0.6:1,boxShadow:isSelected?"0 0 0 3px rgba(70,180,191,0.2)":"none",transition:"all 0.15s ease"}}>
              <span style={{fontSize:17,fontWeight:isSelected?700:500}}>{s}</span>
              {cap&&<span style={{fontSize:13,fontWeight:500,padding:"3px 10px",borderRadius:20,background:full?"#FCECEA":isSelected?"#C0E8EC":"#EAF7F8",color:full?"#C0392B":isSelected?"#2E8A94":"#46b4bf"}}>{full?"Full":`${cap-used} left`}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── CHECK OUT PANEL ──────────────────────────────────────────
function CheckOutPanel({ records, people, loadData }) {
  const [checking, setChecking] = useState(null);
  const [done, setDone] = useState(null);

const activeToday = records
    .filter(r => r.check_in >= todayISO() && !r.check_out && r.service !== FLAG_ALERT_SERVICE && !NO_DURATION_SERVICES.includes(r.service))
    .sort((a,b) => a.name.localeCompare(b.name));
async function handleCheckOut(r) {
    setChecking(r.id);
    const person=people.find(p=>p.name===r.name);
    const lockerUsed=person?.locker&&person?.locker_date===new Date().toISOString().slice(0,10)?person.locker:null;
    await api(`checkin_records?id=eq.${r.id}`, {method:"PATCH", body:JSON.stringify({check_out:new Date().toISOString(),locker_used:lockerUsed}), headers:{...HEADERS,"Prefer":"return=minimal"}});
    if(person?.locker){
      await api(`people?id=eq.${person.id}`,{method:"PATCH",body:JSON.stringify({locker:null,locker_date:null}),headers:{...HEADERS,"Prefer":"return=minimal"}});
    }
    await loadData();
    setDone(r.name);
    setChecking(null);
    setTimeout(()=>setDone(null),4000);
  }

  return (
    <div>
      {done&&(
        <div style={{background:C.successBg,border:`1.5px solid ${C.successBorder}`,borderRadius:10,padding:"12px 16px",marginBottom:16}}>
          <p style={{margin:0,fontSize:15,fontWeight:600,color:C.success}}>✓ {done} checked out successfully!</p>
        </div>
      )}
      {activeToday.length===0
        ? <p style={{fontSize:15,color:C.textMuted,textAlign:"center",padding:"24px 0"}}>No active check-ins right now.</p>
        : (
          <div style={{maxHeight:420,overflowY:"auto",borderRadius:12,border:`1px solid ${C.border}`}}>
            {activeToday.map((r,i)=>{
              const av=avColor(r.name);
              return (
                <div key={r.id} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:checking===r.id?"#EAF7F8":"#fff",borderBottom:i<activeToday.length-1?`1px solid ${C.border}`:"none"}}>
                  <div style={{width:44,height:44,borderRadius:"50%",background:av.bg,color:av.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15,flexShrink:0}}>{initials(r.name)||"?"}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontWeight:600,fontSize:16}}>{r.name}</span>
                    <p style={{margin:"2px 0 0",fontSize:13,color:C.textMuted}}>{r.service} · In: {fmt(r.check_in)}</p>
                  </div>
                  <button onClick={()=>handleCheckOut(r)} disabled={!!checking} style={{...btnOutline,fontSize:14,padding:"8px 16px",opacity:checking?0.5:1,flexShrink:0}}>
                    {checking===r.id?"…":"Check out"}
                  </button>
                </div>
              );
            })}
          </div>
        )
      }
    </div>
  );
}

// ── PUBLIC APP ───────────────────────────────────────────────
function PublicApp({ records, people, services, loading, dbError, loadData }) {
  const [pubView, setPubView] = useState(null);
  const [form, setForm] = useState(emptyForm);
  const [suggestions, setSuggestions] = useState([]);
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [success, setSuccess] = useState(null);
  const [flagAlert, setFlagAlert] = useState(null);
  const [errors, setErrors] = useState({});
  const [saving, setSaving] = useState(false);
  const [scanResult, setScanResult] = useState(null);
  const suggestRef = useRef(null);
  const recordsRef2 = useRef([]);
  const peopleRef2 = useRef([]);

  useEffect(()=>{recordsRef2.current=records;},[records]);
  useEffect(()=>{peopleRef2.current=people;},[people]);

  useEffect(() => {
    function h(e) { if (suggestRef.current && !suggestRef.current.contains(e.target)) setShowSuggestions(false); }
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  useEffect(()=>{
    async function handleScan(code) {
      if(!code.startsWith(QR_PREFIX)) return;
      const guestNum=code.slice(QR_PREFIX.length);
      const person=peopleRef2.current.find(p=>String(p.guest_number)===guestNum);
      if(!person){ setScanResult({action:"error",message:`No volunteer found with ID ${guestNum}`}); return; }
      if(person.flagged){
        setFlagAlert(person);
        setScanResult({action:"error",message:`${person.name} is flagged and cannot check in.`});
        await api("checkin_records",{method:"POST",body:JSON.stringify({name:person.name,type:"Guest",service:FLAG_ALERT_SERVICE,notes:person.flag_reason||null,check_in:new Date().toISOString(),check_out:null}),headers:{...HEADERS,"Prefer":"return=minimal"}});
        await loadData();
        return;
      }
      const svcToUse=person.default_service||"Volunteer";
      const activeRecord=recordsRef2.current.find(r=>r.name===person.name&&r.service===svcToUse&&r.check_in>=todayISO()&&!r.check_out);
      if(activeRecord){
        const now=new Date().toISOString();
        await api(`checkin_records?id=eq.${activeRecord.id}`,{method:"PATCH",body:JSON.stringify({check_out:now}),headers:{...HEADERS,"Prefer":"return=minimal"}});
        const p2=peopleRef2.current.find(p=>p.name===person.name);
        if(p2?.locker){await api(`people?id=eq.${p2.id}`,{method:"PATCH",body:JSON.stringify({locker:null,locker_date:null}),headers:{...HEADERS,"Prefer":"return=minimal"}});}
        await loadData();
        setScanResult({action:"checkout",name:person.name,guestNumber:guestNum,duration:duration(activeRecord.check_in,now,svcToUse)});
      } else {
        const typeToUse=svcToUse==="Volunteer"?"Volunteer":"Guest";
        await api("checkin_records",{method:"POST",body:JSON.stringify({name:person.name,type:typeToUse,service:svcToUse,check_in:new Date().toISOString(),check_out:null}),headers:{...HEADERS,"Prefer":"return=minimal"}});
        await loadData();
        setScanResult({action:"checkin",name:person.name,guestNumber:guestNum});
      }
    }
    const scanBuffer={current:""};
    const scanTimer={current:null};
    function onKeyDown(e){
      const tag=document.activeElement?.tagName;
      if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT") return;
      if(e.key==="Enter"){const code=scanBuffer.current.trim();scanBuffer.current="";if(scanTimer.current)clearTimeout(scanTimer.current);if(code.length>3)handleScan(code);return;}
      if(e.key.length===1){if(scanTimer.current)clearTimeout(scanTimer.current);scanBuffer.current+=e.key;scanTimer.current=setTimeout(()=>{scanBuffer.current="";},SCANNER_TIMEOUT_MS);}
    }
    document.addEventListener("keydown",onKeyDown);
    return()=>document.removeEventListener("keydown",onKeyDown);
  },[loadData]);

  function countToday(s) { return records.filter(r => r.service === s && r.check_in >= todayISO()).length; }

  function handleNameInput(val) {
    setForm(f => ({ ...f, name: val, guestNumber: "" })); setErrors(e => ({ ...e, name: undefined })); setFlagAlert(null);
    if (!val.trim()) { setSuggestions([]); setShowSuggestions(false); return; }
    const q = val.toLowerCase();
    const m = people.filter(p => p.name.toLowerCase().includes(q) || String(p.guest_number).includes(q)).slice(0, 6);
    setSuggestions(m); setShowSuggestions(m.length > 0);
  }

  async function selectPerson(p) {
    setForm(f => ({ ...f, name: p.name, guestNumber: String(p.guest_number) }));
    setSuggestions([]); setShowSuggestions(false); setErrors(e => ({ ...e, name: undefined }));
    if (p.flagged) {
      setFlagAlert(p);
      await api("checkin_records", { method: "POST", body: JSON.stringify({ name: p.name, type: "Guest", service: FLAG_ALERT_SERVICE, notes: p.flag_reason || null, check_in: new Date().toISOString(), check_out: null }), headers: { ...HEADERS, "Prefer": "return=minimal" } });
      await loadData();
    } else { setFlagAlert(null); }
  }

  function validate() {
    const e = {};
    if (!form.name.trim() && !form.guestNumber.trim()) e.name = "Name or guest number is required";
    if (!form.service) e.service = "Please select a service";
    if (form.service && CAPPED_SERVICES[form.service] && countToday(form.service) >= CAPPED_SERVICES[form.service]) e.service = `${form.service} is full for today.`;
    return e;
  }

  async function submit() {
    const e = validate(); if (Object.keys(e).length) { setErrors(e); return; }
    let name = form.name.trim(), gNum = form.guestNumber.trim();
    if (!name && gNum) { const match = people.find(p => String(p.guest_number) === gNum); if (!match) { setErrors({ name: "Guest number not found." }); return; } name = match.name; }
    const person = people.find(p => p.name.toLowerCase() === name.toLowerCase());
    if (person?.flagged) {
      setFlagAlert(person);
      await api("checkin_records", { method: "POST", body: JSON.stringify({ name, type: "Guest", service: FLAG_ALERT_SERVICE, notes: person.flag_reason || null, check_in: new Date().toISOString(), check_out: null }), headers: { ...HEADERS, "Prefer": "return=minimal" } });
      await loadData();
      return;
    }
    const alreadyCheckedIn = records.some(r =>
      r.name.toLowerCase() === name.toLowerCase() &&
      r.check_in >= todayISO() &&
      !r.check_out &&
      r.service === form.service &&
      r.service !== FLAG_ALERT_SERVICE
    );
    if (alreadyCheckedIn) { setErrors({ submit: `${name} is already checked in for ${form.service} today.` }); return; }
    setSaving(true);
    let guestNumber = gNum;
    const existing = person;
    if (!existing) {
      try {
        const res = await api("people", { method: "POST", body: JSON.stringify({ name }), headers: { ...HEADERS, "Prefer": "return=representation" } });
        if (!res.ok) throw new Error();
        const [np] = await res.json(); guestNumber = String(np.guest_number); await loadData();
      } catch (_) { setErrors({ submit: "Failed to register guest." }); setSaving(false); return; }
    } else { guestNumber = String(existing.guest_number); }
    const now = new Date().toISOString();
    const position=form.service&&CAPPED_SERVICES[form.service]&&form.service!=="Laundry"?nextAvailablePosition(form.service,records):null;
    const toInsert = [{ name, member_id: form.memberId || null, type: form.type, service: form.service, notes: form.notes || null, queue_position: position, check_in: now, check_out: null }];
    const addOns = [];
    if (form.service === "Day Center") {
      if (form.addShowers && countToday("Showers") < CAPPED_SERVICES["Showers"]) { const p = nextAvailablePosition("Showers", records); toInsert.push({ name, member_id: form.memberId || null, type: form.type, service: "Showers", notes: form.notes || null, queue_position: p, check_in: now, check_out: null }); addOns.push({ service: "Showers", position: p }); }
      if (form.addLaundry && countToday("Laundry") < CAPPED_SERVICES["Laundry"]) { toInsert.push({ name, member_id: form.memberId || null, type: form.type, service: "Laundry", notes: form.notes || null, queue_position: null, check_in: now, check_out: null }); addOns.push({ service: "Laundry", position: null }); }
    }
    try {
      const res = await api("checkin_records", { method: "POST", body: JSON.stringify(toInsert.length === 1 ? toInsert[0] : toInsert), headers: { ...HEADERS, "Prefer": "return=representation" } });
      if (!res.ok) throw new Error();
      await loadData();
      setSuccess({ name, guestNumber, service: form.service, position, isNew: !existing, addOns });
      setForm(emptyForm); setErrors({}); setFlagAlert(null);
      setTimeout(() => setSuccess(null), 7000);
    } catch (_) { setErrors({ submit: "Failed to save. Please try again." }); }
    setSaving(false);
  }

  const serviceOrder=["Day Center","Community Partnership","Drop-in"];
  const availableServices=services.filter(s=>isServiceAvailableToday(s)&&!CAPPED_SERVICES[s]&&s!=="Volunteer").sort((a,b)=>{const ai=serviceOrder.indexOf(a),bi=serviceOrder.indexOf(b);if(ai===-1&&bi===-1)return 0;if(ai===-1)return 1;if(bi===-1)return-1;return ai-bi;});
  const todayCount = new Set(records.filter(r => r.check_in >= todayISO() && r.service !== FLAG_ALERT_SERVICE).map(r => r.name)).size;
  const guestCount = new Set(records.filter(r => r.type === "Guest" && r.service !== FLAG_ALERT_SERVICE && r.check_in >= todayISO()).map(r => r.name)).size;
  const volCount = records.filter(r => r.type === "Volunteer" && r.service !== FLAG_ALERT_SERVICE).length;

  return (
    <div style={{minHeight:"100vh",background:"#F7FAFA"}}>
      <div style={{background:"#46b4bf",padding:"28px 24px 22px",textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:12}}><Logo/></div>
        <LiveClock/>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"28px 24px 4rem"}}>
        {dbError&&<div style={{background:"#FCECEA",border:"1px solid #F0A9A3",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:15,color:"#C0392B"}}>{dbError}</div>}

        {!loading&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:14,marginBottom:24}}>
            {[["Today",todayCount],["Guests",guestCount],["Volunteers",volCount]].map(([l,v])=>(
              <div key={l} style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:12,padding:"16px 14px",textAlign:"center"}}>
                <p style={{margin:0,fontSize:28,fontWeight:700,color:"#46b4bf"}}>{v}</p>
                <p style={{margin:0,fontSize:13,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>{l}</p>
              </div>
            ))}
          </div>
        )}

        {Object.values(CAPPED_SERVICES_DAYS)[0].includes(new Date().getDay())&&(
          <div style={{marginBottom:28}}>
            <div style={{display:"flex",gap:14}}>
              {Object.entries(CAPPED_SERVICES).map(([svc,cap])=>{
                const used=records.filter(r=>r.service===svc&&r.check_in>=todayISO()).length;
                const full=used>=cap,avail=cap-used;
                return (
                  <div key={svc} style={{flex:1,background:full?"#FCECEA":"#EAF7F8",border:`1.5px solid ${full?"#F0A9A3":"#C0E8EC"}`,borderRadius:12,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:15,fontWeight:600,color:full?"#C0392B":"#2E8A94"}}>{svc}</span>
                    <span style={{fontSize:14,fontWeight:500,color:full?"#C0392B":"#46b4bf",background:full?"transparent":"#fff",padding:"4px 14px",borderRadius:20,border:`1px solid ${full?"#F0A9A3":"#C0E8EC"}`}}>{full?"Full":`${avail} left`}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {scanResult&&<ScanToast result={scanResult} onDone={()=>setScanResult(null)}/>}

        <div style={{display:"flex",gap:14,marginBottom:28}}>
          <button onClick={()=>setPubView(pubView==="checkin"?null:"checkin")} style={{flex:1,padding:"28px 0",borderRadius:14,border:pubView==="checkin"?"2px solid #46b4bf":"1.5px solid #D0E6E5",background:pubView==="checkin"?"#EAF7F8":"#fff",fontWeight:700,fontSize:22,cursor:"pointer",color:pubView==="checkin"?"#2E8A94":"#5A7070",fontFamily:"inherit",transition:"all 0.15s ease"}}>
            {pubView==="checkin"?"▲ Check in":"▼ Check in"}
          </button>
          <button onClick={()=>setPubView(pubView==="checkout"?null:"checkout")} style={{flex:1,padding:"28px 0",borderRadius:14,border:pubView==="checkout"?"2px solid #46b4bf":"1.5px solid #D0E6E5",background:pubView==="checkout"?"#EAF7F8":"#fff",fontWeight:700,fontSize:22,cursor:"pointer",color:pubView==="checkout"?"#2E8A94":"#5A7070",fontFamily:"inherit",transition:"all 0.15s ease"}}>
            {pubView==="checkout"?"▲ Check out":"▼ Check out"}
          </button>
        </div>

        {pubView==="checkin"&&(
          <div style={{background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:14,padding:24,marginBottom:16}}>
            {flagAlert&&(
              <div style={{background:"#FFF0F0",border:"2px solid #C0392B",borderRadius:12,padding:"18px 20px",marginBottom:24}}>
                <p style={{margin:"0 0 6px",fontSize:18,fontWeight:700,color:"#C0392B"}}>⚑ This person is not allowed on the premises</p>
                <p style={{margin:"0 0 4px",fontSize:15,color:"#C0392B"}}><strong>{flagAlert.name}</strong></p>
                {flagAlert.flag_reason&&<p style={{margin:0,fontSize:14,color:"#C0392B"}}>Reason: {flagAlert.flag_reason}</p>}
                <p style={{margin:"10px 0 0",fontSize:14,color:"#5A7070"}}>Please contact a staff member. Check-in has been blocked.</p>
              </div>
            )}
              {success&&!flagAlert&&(
              <div style={{background:"#EAF7F8",border:"1.5px solid #C0E8EC",borderRadius:12,padding:"18px 20px",marginBottom:24}}>
                <p style={{margin:"0 0 6px",fontSize:18,fontWeight:700,color:"#2E8A94"}}>{success.isNew?`Welcome, ${success.name}! You've been registered.`:`Welcome back, ${success.name}!`}</p>
                {success.position&&<p style={{margin:"0 0 4px",fontSize:15,color:"#46b4bf"}}>{success.service}: queue <strong>#{success.position}</strong></p>}
                {success.addOns&&success.addOns.map(a=>(
                  <p key={a.service} style={{margin:"0 0 4px",fontSize:15,color:"#46b4bf"}}>
                    {a.service==="Laundry"
                      ? "Your laundry number will be assigned at the laundry station."
                      : `Shower #${a.position}`}
                  </p>
                ))}
              </div>
            )}
            {errors.submit&&<div style={{background:"#FCECEA",border:"1px solid #F0A9A3",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:15,color:"#C0392B"}}>{errors.submit}</div>}

            <p style={{margin:"0 0 10px",fontSize:15,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Please Choose</p>
            <div style={{display:"flex",gap:14,marginBottom:22}}>
              {["Guest","Volunteer"].map(t=>(
                <button key={t} onClick={()=>setForm(f=>({...f,type:t}))} style={{flex:1,padding:"14px 0",borderRadius:10,border:form.type===t?"2px solid #46b4bf":"1.5px solid #D0E6E5",background:form.type===t?"#EAF7F8":"#fff",fontWeight:form.type===t?700:400,fontSize:17,cursor:"pointer",color:form.type===t?"#2E8A94":"#5A7070",fontFamily:"inherit"}}>{t}</button>
              ))}
            </div>

            <p style={{margin:"0 0 8px",fontSize:15,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>NAME — FIRST TIME? JUST ENTER YOUR NAME AND CHECK IN</p>
            <div style={{marginBottom:6,position:"relative"}} ref={suggestRef}>
              <div style={{position:"relative"}}>
                <input placeholder="Enter your full name…" value={form.name} onChange={e=>handleNameInput(e.target.value)} style={{...inpStyle,borderColor:errors.name?"#C0392B":"#D0E6E5",paddingRight:form.name?44:16}}/>
                {form.name&&(
                  <button onClick={()=>{setForm(f=>({...f,name:"",guestNumber:""}));setSuggestions([]);setShowSuggestions(false);setFlagAlert(null);setErrors(e=>({...e,name:undefined}));}} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"#D0E6E5",border:"none",borderRadius:"50%",width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:15,color:"#5A7070",lineHeight:1}}>×</button>
                )}
              </div>
              {errors.name&&<p style={{margin:"6px 0 0",fontSize:14,color:"#C0392B"}}>{errors.name}</p>}
              {showSuggestions&&suggestions.length>0&&(
                <div style={{position:"absolute",top:"calc(100% + 2px)",left:0,right:0,background:"#fff",border:"1.5px solid #D0E6E5",borderRadius:12,zIndex:10,boxShadow:"0 6px 20px rgba(70,180,191,0.15)",overflow:"hidden"}}>
                  {suggestions.map(p=>{const av=avColor(p.name);return(
                    <div key={p.id} onClick={()=>selectPerson(p)} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",cursor:"pointer",borderBottom:"1px solid #D0E6E5",background:p.flagged?"#FFF5F5":"#fff"}} onMouseEnter={e=>e.currentTarget.style.background=p.flagged?"#FFE8E8":"#EAF7F8"} onMouseLeave={e=>e.currentTarget.style.background=p.flagged?"#FFF5F5":"#fff"}>
                      <div style={{width:40,height:40,borderRadius:"50%",background:av.bg,color:av.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,flexShrink:0}}>{initials(p.name)||"?"}</div>
                      <div style={{flex:1}}><p style={{margin:0,fontSize:16,fontWeight:600}}>{p.name}</p></div>
                      {p.flagged&&<span style={{fontSize:13,padding:"3px 10px",borderRadius:20,background:"#FCECEA",color:"#C0392B",fontWeight:600,flexShrink:0}}>⚑ Flagged</span>}
                    </div>
                  );})}
                </div>
              )}
            </div>

            <ServiceButtons availableServices={availableServices} form={form} setForm={setForm} setErrors={setErrors} countToday={countToday}/>
            {errors.service&&<p style={{margin:"-8px 0 10px",fontSize:14,color:"#C0392B"}}>{errors.service}</p>}

            {form.service==="Day Center"&&(()=>{
              const showersAvail=isServiceAvailableToday("Showers")&&countToday("Showers")<(CAPPED_SERVICES["Showers"]||Infinity);
              const laundryAvail=isServiceAvailableToday("Laundry")&&countToday("Laundry")<(CAPPED_SERVICES["Laundry"]||Infinity);
              if(!showersAvail&&!laundryAvail) return null;
              return (
                <div style={{background:"#EAF7F8",border:"1px solid #C0E8EC",borderRadius:10,padding:"16px 18px",marginBottom:18}}>

function AddPersonPanel({ people, onUpdate }) {
  const [name, setName] = useState("");
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);

  async function handleAdd() {
    if (!name.trim()) return;
    const exists = people.find(p => p.name.toLowerCase() === name.trim().toLowerCase());
    if (exists) { setMsg({type:"error",text:`${name.trim()} is already in the system.`}); return; }
    setSaving(true);
    try {
      const res = await api("people", { method:"POST", body:JSON.stringify({name:name.trim()}), headers:{...HEADERS,"Prefer":"return=minimal"} });
      if (!res.ok) throw new Error();
      setMsg({type:"ok",text:`${name.trim()} has been added to the system.`});
      setName("");
      onUpdate();
      setTimeout(()=>setMsg(null),4000);
    } catch(_) { setMsg({type:"error",text:"Failed to add person. Try again."}); }
    setSaving(false);
  }

  return (
    <div>
      <div style={{display:"flex",gap:10}}>
        <input
          placeholder="Full name…"
          value={name}
          onChange={e=>{setName(e.target.value);setMsg(null);}}

                  {suggestions.map(p=>{const av=avColor(p.name);return(
                    <div key={p.id} onClick={()=>selectPerson(p)} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",cursor:"pointer",borderBottom:"1px solid #D0E6E5",background:p.flagged?"#FFF5F5":"#fff"}} onMouseEnter={e=>e.currentTarget.style.background=p.flagged?"#FFE8E8":"#EAF7F8"} onMouseLeave={e=>e.currentTarget.style.background=p.flagged?"#FFF5F5":"#fff"}>
                      <div style={{width:40,height:40,borderRadius:"50%",background:av.bg,color:av.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,flexShrink:0}}>{initials(p.name)||"?"}</div>
                      <div style={{flex:1}}><p style={{margin:0,fontSize:16,fontWeight:600}}>{p.name}</p></div>
                      {p.flagged&&<span style={{fontSize:13,padding:"3px 10px",borderRadius:20,background:"#FCECEA",color:"#C0392B",fontWeight:600,flexShrink:0}}>⚑ Flagged</span>}
                    </div>
                  );})}
                </div>
              )}
            </div>

            {form.type!=="Volunteer"&&<ServiceButtons availableServices={availableServices} form={form} setForm={setForm} setErrors={setErrors} countToday={countToday}/>}
            {form.type!=="Volunteer"&&errors.service&&<p style={{margin:"-8px 0 10px",fontSize:14,color:"#C0392B"}}>{errors.service}</p>}

            {form.service==="Day Center"&&(()=>{
              const showersAvail=isServiceAvailableToday("Showers")&&countToday("Showers")<(CAPPED_SERVICES["Showers"]||Infinity);
              const laundryAvail=isServiceAvailableToday("Laundry")&&countToday("Laundry")<(CAPPED_SERVICES["Laundry"]||Infinity);
              if(!showersAvail&&!laundryAvail) return null;
              return (
                <div style={{background:"#EAF7F8",border:"1px solid #C0E8EC",borderRadius:10,padding:"16px 18px",marginBottom:18}}>
                  <p style={{margin:"0 0 12px",fontSize:14,fontWeight:600,color:"#2E8A94",textTransform:"uppercase",letterSpacing:"0.05em"}}>CHECK IF YOU WOULD LIKE TO TAKE A SHOWER AND/OR DO LAUNDRY:</p>
                  <div style={{display:"flex",gap:24,flexWrap:"wrap"}}>
                    {showersAvail&&(<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:16,color:C.text}}><input type="checkbox" checked={form.addShowers} onChange={e=>setForm(f=>({...f,addShowers:e.target.checked}))} style={{width:20,height:20,accentColor:"#46b4bf",cursor:"pointer"}}/><span>Showers</span><span style={{fontSize:14,color:C.textMuted}}>({CAPPED_SERVICES["Showers"]-countToday("Showers")} spots left)</span></label>)}
                    {laundryAvail&&(<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:16,color:C.text}}><input type="checkbox" checked={form.addLaundry} onChange={e=>setForm(f=>({...f,addLaundry:e.target.checked}))} style={{width:20,height:20,accentColor:"#46b4bf",cursor:"pointer"}}/><span>Laundry</span><span style={{fontSize:14,color:C.textMuted}}>({CAPPED_SERVICES["Laundry"]-countToday("Laundry")} spots left)</span></label>)}
                  </div>
                </div>
              );
            })()}

            <div style={{marginBottom:26}}>
              <textarea placeholder="Notes (optional)" value={form.notes} onChange={ev=>setForm(f=>({...f,notes:ev.target.value}))} rows={3} style={{...inpStyle,resize:"vertical"}}/>
            </div>
            <button onClick={submit} disabled={saving||!!flagAlert} style={{...btnPrimary,width:"100%",padding:16,fontSize:18,opacity:(saving||!!flagAlert)?0.5:1,cursor:flagAlert?"not-allowed":"pointer"}}>
              {saving?"Saving…":"Check in"}
            </button>
          </div>
        )}
{view==="log"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:20,alignItems:"start"}}>
            {/* LEFT COLUMN — visit log */}
            <div>
              {isServiceAvailableToday("Showers")&&(
                <div style={{display:"flex",gap:14,marginBottom:20}}>
                  {Object.entries(CAPPED_SERVICES).map(([svc,cap])=>{
                    const queue=records.filter(r=>r.service===svc&&r.check_in>=todayISO());
                    const active=queue.filter(r=>!r.check_out);
                    const done=queue.filter(r=>r.check_out);
                    const used=queue.length;
                    const full=used>=cap;
                    return (
                      <div key={svc} style={{flex:1,background:"#fff",border:`1.5px solid ${full?"#F0A9A3":"#C0E8EC"}`,borderRadius:12,padding:"14px 18px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                          <span style={{fontSize:15,fontWeight:700,color:C.tealDark}}>{svc}</span>
                          <span style={{fontSize:13,fontWeight:600,padding:"3px 12px",borderRadius:20,background:full?"#FCECEA":"#EAF7F8",color:full?"#C0392B":"#46b4bf"}}>{full?"Full":`${cap-used} left`}</span>
                        </div>
                        <div style={{display:"flex",gap:16}}>
                          {[["Total",used],["Waiting",active.length],["Done",done.length]].map(([l,v])=>(
                            <div key={l} style={{textAlign:"center"}}>
                              <p style={{margin:0,fontSize:22,fontWeight:700,color:"#46b4bf"}}>{v}</p>
                              <p style={{margin:0,fontSize:11,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>{l}</p>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
                {["All","Day Center","Showers","Laundry","Volunteer","Community Partnership","Drop-in"].map(tab=>(
                  <button key={tab} onClick={()=>setLogTab(tab)} style={{...btnGhost,fontSize:13,padding:"7px 14px",background:logTab===tab?"#46b4bf":"transparent",color:logTab===tab?"#fff":"#5A7070",borderColor:logTab===tab?"#46b4bf":"#D0E6E5"}}>{tab}</button>
                ))}
              </div>
              <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
                <input placeholder="Search by name…" value={search} onChange={e=>setSearch(e.target.value)} style={{...inpStyle,flex:1,minWidth:160}}/>
                <select value={filterDate} onChange={e=>setFilterDate(e.target.value)} style={{...inpStyle,width:130}}><option value="today">Today</option><option value="all">All time</option></select>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <p style={{margin:0,fontSize:14,color:"#5A7070"}}>{people.length} people in directory</p>
                <button onClick={loadData} style={{...btnGhost,fontSize:14}}>Refresh ↻</button>
              </div>
              {loading?<p style={{color:"#5A7070",fontSize:16,textAlign:"center",padding:"2rem 0"}}>Loading…</p>
              :(()=>{
                const dateFiltered=records.filter(r=>{
                if(r.service===FLAG_ALERT_SERVICE) return false;
                if(filterDate==="today"&&r.check_in<todayISO()) return false;
                if(search.trim()&&!r.name.toLowerCase().includes(search.toLowerCase())) return false;
                return true;
              });
              const byName={};
              dateFiltered.forEach(r=>{
                if(!byName[r.name]) byName[r.name]={name:r.name,records:[]};
                if(!byName[r.name].records.find(x=>x.id===r.id)){
                  byName[r.name].records.push(r);
                }
              });
                const grouped=Object.values(byName).filter(g=>{
                  if(logTab==="All") return true;
                  return g.records.some(r=>r.service===logTab);
                }).filter(g=>!search.trim()||g.name.toLowerCase().includes(search.toLowerCase()))
                .sort((a,b)=>{
                  if(logTab==="All") return a.name.localeCompare(b.name);
                  const ar=a.records.find(r=>r.service===logTab);
                  const br=b.records.find(r=>r.service===logTab);
                  const ap=ar?.queue_position||999,bp=br?.queue_position||999;
                  return ap-bp;
                });
                if(grouped.length===0) return <p style={{color:"#5A7070",fontSize:16,textAlign:"center",padding:"2rem 0"}}>No records found.</p>;
                return grouped.map(g=>{
                  const person=people.find(p=>p.name===g.name);
                  const isFlagged=person?.flagged;
                  const av=avColor(g.name);
                  return (
                    <div key={g.name} style={{background:isFlagged?"#FFF5F5":"#fff",border:`1.5px solid ${isFlagged?"#F0A9A3":"#D0E6E5"}`,borderRadius:14,marginBottom:12,overflow:"hidden"}}>
                      <div style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:14}}>
                        <div style={{width:46,height:46,borderRadius:"50%",background:av.bg,color:av.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:16,flexShrink:0}}>{initials(g.name)||"?"}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
                          <span style={{fontWeight:700,fontSize:16}}>{g.name}</span>
                          {isFlagged&&<span style={{fontSize:13,padding:"2px 10px",borderRadius:20,background:"#FCECEA",color:"#C0392B",fontWeight:600}}>⚑ Flagged</span>}
                          <GroupNameEditor name={g.name} records={g.records} onUpdate={loadData}/>
                        </div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                          {g.records.filter(r=>r.service!==FLAG_ALERT_SERVICE&&(logTab==="All"||r.service===logTab)).map(r=>(
                            <PersonServiceTag key={r.id} r={r} onCheckOut={checkOut} onDelete={deleteRecord} onUpdate={loadData}/>
                          ))}
                        </div>
                        </div>
                      </div>
                    </div>
                  );
                });
              })()}
            </div>

            {/* RIGHT COLUMN — lockers */}
            <div>
              <p style={{margin:"0 0 10px",fontSize:15,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Locker & Bin Availability</p>
              <div style={{marginBottom:22}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:6,marginBottom:10}}>
                  {Array.from({length:20},(_,i)=>String(i+1)).map(l=>{
                    const todayStr=new Date().toISOString().slice(0,10);
                    const occupant=people.find(p=>p.locker===l&&p.locker_date===todayStr);
                    return (
                      <div key={l} style={{border:`1.5px solid ${occupant?"#F0A9A3":"#C0E8EC"}`,borderRadius:10,padding:"6px 8px",background:occupant?"#FFF5F5":"#EAF7F8",textAlign:"center"}}>
                        <p style={{margin:"0 0 2px",fontSize:12,fontWeight:700,color:occupant?C.danger:C.tealDark}}>#{l}</p>
                        <p style={{margin:"0 0 4px",fontSize:10,color:occupant?C.danger:C.tealDark,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{occupant?occupant.name:"Open"}</p>
                        <select
                          value={occupant?.name||""}
                          onChange={async e=>{
                            const todayStr=new Date().toISOString().slice(0,10);
                            const val=e.target.value;
                            if(occupant) await api(`people?id=eq.${occupant.id}`,{method:"PATCH",body:JSON.stringify({locker:null,locker_date:null}),headers:{...HEADERS,"Prefer":"return=minimal"}});
                            if(val){const p=people.find(x=>x.name===val);if(p) await api(`people?id=eq.${p.id}`,{method:"PATCH",body:JSON.stringify({locker:l,locker_date:todayStr}),headers:{...HEADERS,"Prefer":"return=minimal"}});}
                            loadData();
                          }}
                          style={{...inpStyle,padding:"2px 2px",fontSize:10,height:24,borderColor:occupant?C.dangerBorder:C.tealMid}}>
                          <option value="">{occupant?"Clear…":"Assign…"}</option>
                          {people.filter(p=>{
                            const todayStr=new Date().toISOString().slice(0,10);
                            const checkedInToday=records.some(r=>r.name===p.name&&r.check_in>=todayISO()&&r.service!==FLAG_ALERT_SERVICE);
                            const noLocker=!p.locker||p.locker_date!==todayStr;
                            return checkedInToday&&noLocker;
                          }).map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
                        </select>
                      </div>
                    );
                  })}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:8}}>
                  {["Bin A","Bin B"].map(l=>{
                    const todayStr=new Date().toISOString().slice(0,10);
                    const occupant=people.find(p=>p.locker===l&&p.locker_date===todayStr);
                    return (
                      <div key={l} style={{border:`1.5px solid ${occupant?"#F0A9A3":"#C0E8EC"}`,borderRadius:10,padding:"10px 14px",background:occupant?"#FFF5F5":"#EAF7F8"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                          <span style={{fontSize:14,fontWeight:700,color:occupant?C.danger:C.tealDark}}>{l}</span>
                          <span style={{fontSize:13,color:occupant?C.danger:C.tealDark,fontWeight:500}}>{occupant?occupant.name:"Open"}</span>
                        </div>
                        <select
                          value={occupant?.name||""}
                          onChange={async e=>{
                            const todayStr=new Date().toISOString().slice(0,10);
                            const val=e.target.value;
                            if(occupant) await api(`people?id=eq.${occupant.id}`,{method:"PATCH",body:JSON.stringify({locker:null,locker_date:null}),headers:{...HEADERS,"Prefer":"return=minimal"}});
                            if(val){const p=people.find(x=>x.name===val);if(p) await api(`people?id=eq.${p.id}`,{method:"PATCH",body:JSON.stringify({locker:l,locker_date:todayStr}),headers:{...HEADERS,"Prefer":"return=minimal"}});}
                            loadData();
                          }}
                          style={{...inpStyle,padding:"4px 8px",fontSize:12,height:30,borderColor:occupant?C.dangerBorder:C.tealMid}}>
                          <option value="">{occupant?"Clear…":"Assign…"}</option>
                          {people.filter(p=>{
                            const todayStr=new Date().toISOString().slice(0,10);
                            const checkedInToday=records.some(r=>r.name===p.name&&r.check_in>=todayISO()&&r.service!==FLAG_ALERT_SERVICE);
                            const noLocker=!p.locker||p.locker_date!==todayStr;
                            return checkedInToday&&noLocker;
                          }).map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
                        </select>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        )}
        {view==="analytics"&&<AnalyticsTab records={records}/>}
<div style={{borderTop:"1px solid #D0E6E5",paddingTop:20,marginBottom:20}}>
              <p style={{margin:"0 0 10px",fontSize:15,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Add person to system</p>
              <AddPersonPanel people={people} onUpdate={loadData}/>
            </div>
            <div style={{borderTop:"1px solid #D0E6E5",paddingTop:20,marginBottom:20}}>
              <p style={{margin:"0 0 10px",fontSize:15,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Manage people</p>
              <PeopleRemover people={people} onRemove={async(p)=>{await api(`people?id=eq.${p.id}`,{method:"DELETE"});loadData();}} onFlag={flagPerson} onUpdate={loadData}/>
            </div>
            <div style={{borderTop:"1px solid #D0E6E5",paddingTop:20,marginBottom:20}}>
              <p style={{margin:"0 0 10px",fontSize:15,fontWeight:600,color:"#5A7070",textTransform:"uppercase",letterSpacing:"0.05em"}}>Service types</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
                {services.map(s=>(<span key={s} style={{display:"flex",alignItems:"center",gap:5,fontSize:14,padding:"6px 14px",background:"#EAF7F8",border:"1px solid #C0E8EC",borderRadius:20,color:"#2E8A94",fontWeight:500}}>{s}{CAPPED_SERVICES[s]?<span style={{fontSize:12,opacity:0.7}}> · {CAPPED_SERVICES[s]}</span>:null}<button onClick={()=>removeService(s)} style={{background:"none",border:"none",cursor:"pointer",color:"#2E8A94",padding:"0 2px",fontSize:16,lineHeight:1,opacity:0.6}}>×</button></span>))}
              </div>
              <div style={{display:"flex",gap:10}}>
                <input placeholder="Add new service…" value={newService} onChange={e=>setNewService(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addService()} style={{...inpStyle,flex:1}}/>
                <button onClick={addService} style={{...btnOutline,padding:"10px 20px",fontSize:15}}>Add</button>
              </div>
            </div>
                <div style={{borderTop:"2px solid #C0E8EC",marginTop:40,paddingTop:28}}>
          <h2 style={{margin:"0 0 24px",fontSize:22,fontWeight:700}}>Analytics</h2>
          <AnalyticsTab records={records}/>
        </div>
          <button onClick={exportCSV} style={{...btnOutline,width:"100%",textAlign:"center",padding:13,fontSize:15}}>Export all check-ins as CSV ↓</button>
        </div> 
      </div>
    </div>
  );
}

// ── ROOT ─────────────────────────────────────────────────────
function Root() {
  const [records,setRecords]=useState([]);
  const [services,setServices]=useState([]);
  const [people,setPeople]=useState([]);
  const [loading,setLoading]=useState(true);
  const [dbError,setDbError]=useState(null);

  const loadData=useCallback(async()=>{
    try {
      const [rRes,sRes,pRes]=await Promise.all([api("checkin_records?order=check_in.desc"),api("checkin_services?order=name.asc"),api("people?order=name.asc")]);
      if(!rRes.ok||!sRes.ok||!pRes.ok) throw new Error();
      const [rData,sData,pData]=await Promise.all([rRes.json(),sRes.json(),pRes.json()]);
      setRecords(rData);setServices(sData.map(s=>s.name));setPeople(pData);setDbError(null);
    } catch(_){setDbError("Could not connect to database.");}
    setLoading(false);
  },[]);

  useEffect(()=>{loadData();const t=setInterval(loadData,3000);return()=>clearInterval(t);},[loadData]);

  if(IS_ADMIN_MODE) return <AdminApp/>;
  if(IS_QUEUE_MODE) return <QueueView records={records} people={people} onMarkComplete={async(id)=>{await api(`checkin_records?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({check_out:new Date().toISOString()}),headers:{...HEADERS,"Prefer":"return=minimal"}});loadData();}} onCancel={async(id)=>{await api(`checkin_records?id=eq.${id}`,{method:"DELETE"});loadData();}} onLogout={()=>{}} loadData={loadData}/>;
  return <PublicApp records={records} people={people} services={services} loading={loading} dbError={dbError} loadData={loadData}/>;
}

ReactDOM.render(<Root/>, document.getElementById("root"));
</script>
</body>
</html>
